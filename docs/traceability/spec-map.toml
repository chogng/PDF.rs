[[requirement]]
id = "RPE-ARCH-001/5.6"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native stream decoding binds exact encoded bytes and canonical parameters to sealed proof and enforces strict foundational-filter, Flate, TIFF/PNG predictor, output, capacity, fuel, and cancellation budgets."
features = ["core.stream-filter-decode", "core.object-stream-resolution", "core.source-xref-stream-acquisition", "core.source-revision-chain-acquisition", "core.source-acquired-document-services", "core.page-content-acquisition"]
implementation = ["core/filters", "core/object", "core/document"]
tests = ["core/filters::decode_behavior", "core/filters::predictor_behavior", "core/filters::dictionary_plan", "core/filters::repository_policy", "core/object::filtered_object_stream", "core/object::repository_policy", "core/document::source_xref_stream", "core/document::source_revision_chain", "core/document::acquired_object", "core/document::acquired_services", "core/document::page_content", "core/document::repository_policy"]
status = "partial"
notes = "The m1.basic-stream-filters.v1 product slice consumes one exact immutable ByteSlice and publishes non-Clone DecodedStream bytes only together with sealed evidence for the complete SourceSnapshot, source identity, owner ObjectRef, dictionary and encoded physical spans, encoded slice, canonical filter plan, profile, validated limits, fuel schedule and consumption, cumulative output, allocator-reported peak simultaneous intermediate/output capacity, and final decoded length. An empty plan is an internal identity path; the non-standard PDF name Identity and unknown or abbreviated names are UnsupportedFilter without external fallback. Strict ASCIIHexDecode, ASCII85Decode, RunLengthDecode, and dependency-free zlib-wrapped FlateDecode implementations support ordered chains, decoded-only coordinates, deterministic per-layer/cumulative/final output and retained-capacity ceilings, source-change rejection, and cooperative cancellation. Flate covers stored, fixed-Huffman, and dynamic-Huffman blocks, validates declared windows through 32 KiB plus Adler-32, and charges block, Huffman, input, output, and cancellation work under the same fuel schedule. Canonical per-stage decode parameters implement TIFF Predictor 2 over packed 1-, 2-, 4-, 8-, and 16-bit samples and every PNG predictor value at or above 10 through row tags 0 through 4, with checked row geometry, exact framing, algorithm fuel, cancellation, and layered capacity/output enforcement. The opt-in `OpenSourceXrefStreamJob` and `OpenSourceRevisionChainJob` paths now construct DecodeRequest from their exact source-owned ByteSlice, canonicalize strict direct Filter/DecodeParms, retain the sealed DecodedStream beside raw framing, and pre-admit aggregate decoder and semantic-parser work/retention. `parse_filtered_object_stream` now re-canonicalizes the exact source dictionary, requires an already sealed matching DecodedStream proof, and consumes it together with the framed container and exact encoded ByteSlice to publish bounded object-stream semantics. The source-acquired document owner now binds exact filtered object-stream payload acquisition to this same sealed decode path before parsing and resolving compressed values. The m2.page-content-acquisition.v1 document composition reuses that exact canonical filter and sealed decode boundary per ordered Page content stream, preserves unsupported-filter versus malformed-decode outcomes, and adds only a source-bound explicit identity proof for a valid zero-length unfiltered payload; it does not weaken the foundational decoder's nonempty ByteSlice contract. LZW, non-predictor decode parameters, crypt filters, image codecs, zero-length filtered input, registered fuzzing, and differential evidence for the filter feature itself remain open. Every affected feature remains PLANNED and this partial mapping does not claim general stream support or M1 exit."

[[requirement]]
id = "RPE-ARCH-001/5.8-5.9"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native document composition provides bounded text strings, outline enumeration, complete and lazy Page/Pages services, inherited page values, no-I/O page-property lookup, ordered page content acquisition, and sealed jobs over proof-preserving indices."
features = ["core.pdf-text-string", "core.strict-outline", "core.strict-page-count", "core.shared-attested-service-jobs", "core.source-acquired-document-services", "core.ordered-page-index", "core.inherited-page-values", "core.page-property-lookup", "core.page-content-acquisition"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::outline_limit_config", "core/document::page_tree_count", "core/document::page_tree_limit_config", "core/document::page_index", "core/document::page_materialization", "core/document::page_properties", "core/document::page_content", "core/document::local_repair_open", "core/document::acquired_services", "core/document::repository_policy", "tools/baseline::pdfium_outline_real_adapter", "tools/baseline::pdfium_page_count_real_adapter", "tools/baseline::pdfium_page_count_performance", "tools/baseline::repository_pdfium_outline_probe", "tools/baseline::repository_pdfium_page_count_probe", "tools/baseline::repository_pdfium_page_count_performance_probe", "tools/quality::m1_document_service_differential", "tools/quality::m1_document_service_maturity", "tools/quality::m1_document_service_fuzz", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.pdf-text-string.v1 foundation decodes bounded PDFDocEncoding and BOM-selected UTF-16BE values under the hash-pinned ISO clauses without normalization or lossy replacement. The m1.strict-outline.v1 bootstrap consumes the same proof-preserving strict-base boundary to lazily enumerate a bounded direct-value outline, validate its linked-list topology and recursively recomputed item/root Count semantics, and retain redacted owned titles without executing actions. Direct null optional fields are omitted; indirect semantic fields and indirect-null equivalence and destination resolution remain open. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly on a valid three-item observable subset and records the expected wrong-Prev strictness difference; it is not a registered baseline or correctness oracle and cannot observe the strict root/link/raw-target surface. The m1.strict-page-count.v1 bootstrap requires a direct trailer-root Catalog with unique Type and Pages fields, explicit Page/Pages node types, exact Parent back-links, direct Kids reference arrays, and nonnegative Count values. A deterministic preallocated open-addressing table and bounded active path distinguish cycles from duplicate children; a postorder traversal compares every declared Count with validated leaf Pages and never uses untrusted Count or Kids data for allocation. Per-job limits cover nodes, depth, leaf pages, per-node children, aggregate child reads/parses, and actual traversal backing capacity; Pending polls preserve lower charging, cancellation is cooperative, and traversal storage is released before terminal publication. Both services now have owned job constructors over sealed cloneable strict or locally repaired handles; borrowed constructors remain source-compatible, repaired ownership retains the complete xref/object diagnostic ledger, and every job preserves the same Pending, cancellation, source-change, budget, and terminal state machines. The repaired handle is an alternate core proof source; the bounded M1 Session continues to select strict base opening and owns the runtime request lifecycle separately. A separate pinned, non-gating PDFium page-count helper performs a real Native/PDFium O4 comparison: valid one-page and nested three-page fixtures match exactly and repeat byte-for-byte, while an otherwise identical nested fixture whose positive root Count is 4 instead of the recomputed 3 yields Native RPE-DOCUMENT-0033 and PDFium page_count=4, classified as an expected strictness difference. A release-mode follow-up measures two 50-sample trials on one hash-fixed 128-page fixture: all timed and warmup counts match, Native's full in-memory strict path has 0.360-0.378 ms trial medians, and the schema-2 cold-child PDFium boundary has 7.882-7.896 ms trial medians. The scopes differ, so this is performance_eligible=false development-boundary evidence rather than an engine-kernel performance verdict. The canonical Native loop separately obtains page_count=1 and observes pages_processed=1 in linked same-input PDFium build-readiness pageinfo; that older equality remains a non-gating smoke observation with differential_eligible=false rather than a registered page-count differential. The PDFium page-count probes remain unregistered and non-gating, and none of those O4 observations is a product verdict or part of the project-owned maturity graph. The source-acquired document owner now lends the same bounded page-count and outline semantics across traditional, primary xref-stream, filtered or unfiltered object-stream, hybrid-supplement, and incremental latest-wins chains while retaining the complete acquisition proof and physical-versus-decoded coordinates. It preserves Pending replay, cancellation, source-change, exact aggregate child work, and branch-specific retained admission, and direct null remains omission while ill-typed optional fields fail. Registered project-owned DIFFERENTIAL promotion is complete at bounded M1 scale; lazy PageIndex, page handles, inherited resources, persistent outline state, generic Session scheduling, and general PDF compatibility services remain outside the claim. This record contributes to covered M1 exit but does not claim M2."

component_notes = "M2 adds four separate PLANNED document profiles without changing the registered M1 maturity evidence. The m2.ordered-page-index.v1 profile cold-opens only Catalog/root structure, lazily validates requested ranges, retains explicit DeclaredCount, ValidatedPartition, and CompleteSubtree evidence, and publishes source-/revision-bound PageHandles. The m2.inherited-page-values.v1 profile consumes one such handle and its exact validated leaf-to-root chain, opens each ancestor through the same strict or locally repaired authority, and selects the nearest non-null MediaBox, CropBox, Rotate, and Resources with exact defining and alias provenance. The m2.page-property-lookup.v1 profile borrows that retained resource dictionary, checks source and cancellation without polling for bytes, scans only a direct /Properties dictionary under independent lookup and entry-visit budgets, and returns a fixed-size proof for one uniquely selected indirect reference without copying the name or opening the target. The m2.page-content-acquisition.v1 profile consumes and retains the exact materialized Page, resolves a unique Contents value through bounded whole-object aliases, opens array-selected streams in order, and retains exact physical stream, canonical filter, and decoded proof before atomic publication under independent structure, child-work, encoded, decoded, fuel, and retained-state limits. Acquired-chain page indexing/materialization/content acquisition, nested component references, persistent service ownership, and general PDF compatibility remain open. Content VM execution is owned by the separate core/content profile. These M2 features remain PLANNED and do not alter the covered M1 exit record."

repair_service_notes = "Since trace version 0.58, the bounded page-count and outline state machines accept borrowed or cloneable LocallyRepairedRevisionIndex ownership without converting it into the public strict typestate. The complete local xref/object repair ledger stays reachable for the full service-job lifetime. Runtime policy still opens only the strict traditional-base path, so this closes repaired core-service ownership but does not by itself promote either service or close M1."

