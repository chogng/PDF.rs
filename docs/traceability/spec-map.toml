status = "partial"
notes = "The m1.pdf-text-string.v1 foundation decodes bounded PDFDocEncoding and BOM-selected UTF-16BE values under the hash-pinned ISO clauses without normalization or lossy replacement. The m1.strict-outline.v1 bootstrap consumes the same proof-preserving strict-base boundary to lazily enumerate a bounded direct-value outline, validate its linked-list topology and recursively recomputed item/root Count semantics, and retain redacted owned titles without executing actions. Direct null optional fields are omitted; indirect semantic fields and indirect-null equivalence and destination resolution remain open. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly on a valid three-item observable subset and records the expected wrong-Prev strictness difference; it is not a registered baseline or correctness oracle and cannot observe the strict root/link/raw-target surface. The m1.strict-page-count.v1 bootstrap requires a direct trailer-root Catalog with unique Type and Pages fields, explicit Page/Pages node types, exact Parent back-links, direct Kids reference arrays, and nonnegative Count values. A deterministic preallocated open-addressing table and bounded active path distinguish cycles from duplicate children; a postorder traversal compares every declared Count with validated leaf Pages and never uses untrusted Count or Kids data for allocation. Per-job limits cover nodes, depth, leaf pages, per-node children, aggregate child reads/parses, and actual traversal backing capacity; Pending polls preserve lower charging, cancellation is cooperative, and traversal storage is released before terminal publication. A separate pinned, non-gating PDFium page-count helper performs a real Native/PDFium O4 comparison: valid one-page and nested three-page fixtures match exactly and repeat byte-for-byte, while an otherwise identical nested fixture whose positive root Count is 4 instead of the recomputed 3 yields Native RPE-DOCUMENT-0033 and PDFium page_count=4, classified as an expected strictness difference. A release-mode follow-up measures two 50-sample trials on one hash-fixed 128-page fixture: all timed and warmup counts match, Native's full in-memory strict path has 0.360-0.378 ms trial medians, and the schema-2 cold-child PDFium boundary has 7.882-7.896 ms trial medians. The scopes differ, so this is performance_eligible=false development-boundary evidence rather than an engine-kernel performance verdict. The canonical Native loop separately obtains page_count=1 and observes pages_processed=1 in linked same-input PDFium build-readiness pageinfo; that older equality remains a non-gating smoke observation with differential_eligible=false rather than a registered page-count differential. The real page-count probes are also unregistered and non-gating, and the batch is not a registered page-count differential; the feature state remains PLANNED, and none of these observations is a product verdict. The results remain closed-world strict-base summaries rather than revision-chain, repair, lazy PageIndex, page-handle, inherited-resource, persistent outline, or general PDF compatibility services; they do not claim M1 or M2 exit."

