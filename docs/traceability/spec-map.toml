status = "partial"
notes = "The initial VM validates BMC, name-based BDC, and EMC operand shapes, enforces an independent marked-content depth limit, rejects underflow and terminal imbalance, and emits only paired begin/end marked-content Scene commands with exact stream object, stream ordinal, decoded span, and page-global operator provenance. Name-based BDC may retain one fixed-size PagePropertyReference and Scene resource identity after no-I/O lookup; repeated targets are interned by Scene while each use retains its own proof. Direct BDC property dictionaries are structured Unsupported. MP and DP are also explicit Unsupported outcomes after operand validation rather than silently ignored or flattened into malformed syntax. Optional-content semantics, property-target interpretation, structure-tree association, artifacts, ActualText, extraction, accessibility, and rendering behavior remain outside this partial mapping."

[[requirement]]
id = "ISO-32000-1:2008/14.6.1"
