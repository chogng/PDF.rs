notes = "Synthetic parse/Scene/Text/Pixel bundles, baseline protocol v2, a deadline/byte-limited generic direct-child supervisor, a bounded replayable one-page/table-xref DSL profile, and a canonical content-verified T0 corpus manifest are implemented alongside benchmark statistics. A reviewed PDFium executable and adapter, platform-enforced isolation, complete baseline-ledger evidence, broader DSL variants, continuous fuzzing, benchmark evidence, and T1+ corpus scale gates remain open."

[[requirement]]
