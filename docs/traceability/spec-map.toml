[[requirement]]
id = "ISO-32000-1:2008/7.9.2.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Human-readable PDF text strings select PDFDocEncoding unless an FE FF byte-order marker selects UTF-16BE, including supplementary Unicode characters."
features = ["core.pdf-text-string", "core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.pdf-text-string.v1 bootstrap consumes an already lexical-decoded PdfString. A leading FE FF selects UTF-16BE; every other prefix selects PDFDocEncoding. UTF-16BE payloads require even byte length and exact surrogate pairing, including supplementary scalars. A two-pass decoder measures logical UTF-8 length before fallible reservation, bounds both input and logical/allocator-retained UTF-8 bytes, checks cancellation after at most 256 input code units, and redacts content from diagnostics. It preserves but does not interpret Unicode language escape sequences, performs no normalization, and does not implement the PDF 2.0 UTF-8 extension. This mapping is partial and does not claim a complete outline, metadata, accessibility, or conformance service."

[[requirement]]
id = "ISO-32000-1:2008/D.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "PDFDocEncoding assigns defined single-byte codes to Unicode scalars and identifies undefined code points."
features = ["core.pdf-text-string", "core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The PDFDocEncoding mapping is manually transcribed from the hash-pinned normative Table D.2 rather than from an external implementation. Tests cover every non-identity assignment, defined TAB/LF/CR controls, bytes marked undefined in the table, identity ASCII and Latin ranges through boundary inputs, exact resource limits, and redacted failures. Undefined codes are rejected instead of substituted. This is a text-string decoding primitive, not font encoding, content extraction, or an ISO conformance claim."

[[requirement]]
id = "ISO-32000-1:2008/7.3.9"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "A null dictionary value is equivalent to an omitted entry, including an indirect reference that resolves to no object."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap treats direct null values as omitted for optional Catalog and outline fields before applying pair, link, count, and target rules. Its strict attested lookup does not yet implement the broader rule that an undefined indirect reference or an indirect reference resolving to null is equivalent to null. Instead, depending on field position, those cases remain lookup failures, strict root/item dictionary shape failures, or direct-only semantic-value failures. This entry records that compatibility boundary and does not claim general dictionary or object-resolution conformance."

[[requirement]]
id = "ISO-32000-1:2008/7.3.10"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Unless a rule requires otherwise, an object value may be direct or reached through an indirect reference with equivalent semantics."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap follows the Catalog Outlines reference and the structural First, Last, Parent, Prev, and Next references that their tables require to be indirect. It accepts direct outline-root Type and direct Title, Count, Dest, and A values only. An indirect form of any of those semantic fields returns UnsupportedOutlineRepresentation before dereferencing, so the bootstrap records that the form is permitted by 7.3.10 but deliberately makes no claim that the referenced target has the required type or value. Whole-object aliases and a general nested semantic resolver remain unsupported."

[[requirement]]
id = "ISO-32000-1:2008/7.7.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "A Catalog may identify the document outline root through an optional indirect Outlines reference."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap lazily interprets a unique non-null Catalog Outlines field only when outline enumeration is requested. A missing or null field returns an empty outline; a present value must be an exact indirect reference reopened through the attested revision. Page counting deliberately does not inspect this optional service field. Catalog aliases, revision chains, repair, and a persistent Catalog cache remain unsupported, so this entry is partial."

[[requirement]]
id = "ISO-32000-1:2008/12.3.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Document outlines form parent-owned linked lists with text titles and recursively defined signed visible-item counts."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::outline_limit_config", "core/document::repository_policy", "tools/baseline::pdfium_outline_real_adapter", "tools/baseline::repository_pdfium_outline_probe"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap reopens every root and item dictionary through one proof-preserving attested index, validates paired First and Last boundaries, exact Parent and Prev links, initial Prev and terminal Next shape, global uniqueness and cycles, and recomputes signed item and nonnegative root Count values without trusting them for allocation or traversal. A nonempty root requires Count equal to all visible items, including closed top-level items themselves but excluding their hidden descendants; an empty root requires Count omission. It emits a bounded owned preorder with decoded direct text-string titles and direct Dest-or-A target kind but never executes an action. Limits cover items, depth, siblings, child object work, title input and UTF-8 capacity, and allocator-reported result/traversal storage; title output is measured before aggregate allocation checks, cancellation is cooperative, and diagnostics are content-redacted. Section 7.3.10 permits indirect outline-root Type and indirect Title, Count, Dest, and A forms, but this bootstrap returns UnsupportedOutlineRepresentation before dereferencing and therefore does not judge the referenced target valid. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly for a valid three-item fixture over preorder depth, normalized title, signed item Count, and target kind; a wrong-Prev fixture yields Native RPE-DOCUMENT-0041 while PDFium still produces the outline, an expected difference because its public API does not expose Prev. Root Count, Last, Parent, Prev, raw target shape, and invalid-empty distinctions remain outside that external observable surface. Styles, destination resolution, action interpretation, indirect-null equivalence, revision chains, repair, registered fuzzing, contained baseline registration, and broad corpus differential evidence remain open; this mapping does not claim ISO conformance or M1 exit."

[[requirement]]
