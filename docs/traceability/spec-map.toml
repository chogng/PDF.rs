notes = "Current executable evidence drives one real generated 612-byte PDF through the product strict-base opening entry and the one-job strict-open coordinator, covering all five parser checkpoints and upper-half-before-lower out-of-order supply. Coordinator public run_one is the only parser entry; host ingress only mutates Range state and may queue completion, never polls parser code, and leaves progress to a later exclusive actor turn. The coordinated host-failure path consumes one exact failure completion without a parser poll or cancellation probe. Ready crosses as an opaque move-only handoff containing the attested index and the same private source owner; the coordinator then reports zero resources and consuming close returns exact owner-release evidence. The sibling direct lower-owner path retains arbiter-bound move-only dispatch, exact issuer/ticket/job/checkpoint/generation validation, and stale-generation rejection without parser work. Lower component suites separately cover namespaced tickets, ordered resume/failure completion, bounded snapshot bytes, syntax, traditional xref, object framing, strict opening, foreign and duplicate ingress, cancellation before late bytes, source-change rejection, idempotent close, permit mismatch cases, page counting, and outline enumeration. Strict-policy regressions pin the R0 no-recovery contract across xref, object, and strict-base composition. The explicit xref R1 sibling now first exhausts that strict child, allowlists only fixed-row whitespace or a local final-anchor failure, scans a bounded delta for unique token-boundary traditional anchors, canonicalizes only same-width PDF horizontal whitespace, reuses the normal section parser, and publishes source-bound diagnostics with independent scan/workspace/candidate/edit/diagnostic budgets. Unsupported, resource, cancellation, and snapshot failures never enter repair. The explicit object R1 sibling likewise exhausts the unchanged strict framer, allowlists only an invalid expected header or a local direct-stream boundary failure, scans fixed offset or length deltas, normally revalidates a unique candidate under parent-lent aggregate validation plus repair-only scan and candidate caps, and publishes source-bound declared/effective diagnostics. Zero repair-only caps preserve strict-valid success while rejecting the corresponding repair work before its source read or candidate acceptance. Missing, duplicate, invalid, negative, or indirect Length and all unsupported, resource, cancellation, snapshot/source, configuration, and internal failures remain terminal. The document repair pipeline retains the local-xref proof, derives complete snapshot/bound/revision-bound effective offsets only from proof-bearing local objects, and pairs every proof with its interval while atomically re-sorting and rebuilding all upper bounds under aggregate plan and sort budgets. A consuming sibling then replays planned direct-length semantics, linearly attests the header, every effective object, and all top-level trivia under aggregate child-work caps, and publishes only a sealed `LocallyRepairedRevisionIndex` retaining the complete xref/object repair ledger. `OpenLocallyRepairedBaseRevisionJob` is the single core repaired-open coordinator: one JobId and seventeen globally distinct checkpoints own local xref, every first-pass probe, atomic geometry rebuild, and final attestation; first-pass aggregate object, read, parse, repair-scan, candidate, and evidence caps are lent before work. Its move-only repaired proof now offers borrowed and cloneable page-count/outline factories while retaining the complete diagnostic ledger. A bounded xref primitive validates unfiltered or caller-decoded xref-stream tables and preserves decoded coordinates separately from source spans; the owning document acquisition now binds opt-in foundational decoding to the exact encoded ByteSlice and retains the sealed proof; a pure revision composer validates already-parsed newest-to-oldest precedence. A separate Range-resumable anchored traditional job accepts one caller-supplied section anchor and exclusive bound, retains optional `/Prev`, `/XRefStm`, and `/Root`, and validates sparse update rows without crossing the strict base proof. The staged object path exposes direct or indirect Length declarations and resumes exact boundary validation from same-snapshot resolver metadata, including sparse Range, cancellation, and source-change tests. A bounded document resolver connects the already-composed revision and staged-object components for effective uncompressed targets and uncompressed direct-integer indirect Length dependencies. The unfiltered object-stream slice consumes a fully framed generation-zero container plus its exact source-bound payload, preserves decoded coordinates separately, and binds compressed xref index/object-number evidence to the latest effective container. It does not itself acquire source revisions, schedule object-stream dependencies, decode filters, linearly attest update placement, integrate strict opening or document services, or provide complete resolver ownership. The separate `OpenSourceRevisionChainJob` now acquires complete direct-Length traditional plus proof-bound filtered or unfiltered primary-stream, hybrid, and incremental chains under one Pending child and pre-admitted aggregate decode/work/retention bounds, while retaining every raw source proof, every optional sealed decode proof, and the private composed chain. The xref acquisition layer now constructs and consumes the foundational filter proof, including TIFF/PNG prediction after Flate; the object-stream primitive now consumes the exact sealed proof but does not acquire or schedule its source bytes. The machine-readable M1 profile ledger registers strict R0 and bounded local R1 at REFERENCE and strict page-count and outline at DIFFERENTIAL; its PR validator rejects paper promotion. Page-count and outline advance in this one atomic traceability change through both ordered section 11.7 gates: their reviewed reference implementation, O0/O1 cases, boundaries, budgets, provenance, and independent review first satisfy PLANNED-to-REFERENCE, then the same content-addressed graph's O2 adjudication, disjoint holdouts, fuzz/minimizer, raw performance distribution, full-session differential, and reference fingerprint satisfy REFERENCE-to-DIFFERENTIAL. There was no intermediate product or CANARY exposure. The bounded `M1StrictDocumentSession` now owns the fixed strict-open and service lifecycle but is not a complete Session or generic scheduler, while the repaired proof separately owns core page-count/outline jobs without losing R1 provenance. The separate snapshot-bound Range coalescer now produces deterministic bounded host-range plans without transport, ticket completion, or parser execution. A bounded test-only loopback host now exercises coalesced out-of-order Range delivery, late-response cancellation, and changed-validator source teardown without becoming product transport. The source-acquired document owner now closes filtered or unfiltered object-stream scheduling and acquired-chain page-count/outline integration across traditional, xref-stream, hybrid, and incremental latest-wins representations. Platform Range transport, a generic multi-job scheduler with priority, fairness, backpressure, and a job registry, request/generation and Worker lifecycle, viewport generations, browser/desktop E2E, indirect-Length xref streams, and broader registered fuzz campaigns remain outside these bounded components. Project-owned O0/O1/O2, two disjoint holdouts, a three-seed fixed 64-run libFuzzer replay with real cmin, exactly 21 reference-checked Native release samples, reviewed fingerprints, and full-session comparison provide the registered page-count and outline DIFFERENTIAL evidence. PDFium helpers remain unregistered, non-gating O4 observations. Together with the Range lifecycle and R0/R1 evidence, these bounded gates cover M1; the open generic scheduler, product transport, broader compatibility, continuous fuzzing, and CANARY-scale work remain non-blocking and this record does not claim M2."

component_notes = "The M1 component set now includes strict-first R0, bounded diagnostic R1, proof-preserving traditional/stream/hybrid revision acquisition, staged direct or indirect Length resolution, unfiltered compressed-object binding, foundational filters with TIFF/PNG predictors, one repaired-proof page-count/outline service boundary, and one bounded `M1StrictDocumentSession`. The repaired boundary retains its complete local xref/object diagnostic ledger inside borrowed or cloneable proof handles while internally reusing the same bounded service state machines; it does not erase repaired provenance into a strict typestate. The actor composes the existing strict traditional-base opener, the same private Range arbiter, a shared strict attested index, one Ready cache owner, and exactly one page-count plus one outline slot under caller-issued request/job/generation identities. Its public `run_one` polls at most one parser job, all ingress is parser-free, accepted data/ticket failure may queue later work, fixed two-service selection is round-robin, and explicit close/source-change drops jobs/permits, cache, index, then source; lower Range-integrity poisoning is separately fail-closed with zero terminal resources. Reverse Range delivery, exact cancellation, stale generations, explicit and Range-detected source change, fixed-service fairness, host failure, active-job close, and terminal accounting are executable E2E. It is intentionally not a generic priority scheduler, Worker/IPC registry, rendering session, or arbitrary service queue. Proof-preserving filtered or unfiltered acquired-chain object resolution and page-count/outline services are now executable across the required representation matrix, and the loopback Range lifecycle gate is executable. Registered page-count and outline DIFFERENTIAL evidence now closes the bounded M1 exit gate; strict R0 and local R1 are REFERENCE, while the broader component profiles remain PLANNED and the actor is still not a generic scheduler or complete product Session."

[[requirement]]
id = "RPE-ARCH-001/15.3/M2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "M2 builds the proof-bound document model, inherited page resources, bounded Content VM, immutable Scene v1, and stable canonical Scene comparison."
features = ["core.ordered-page-index", "core.inherited-page-values", "core.page-property-lookup", "core.page-content-acquisition", "core.content-operator-scanner", "core.content-vm-scene-v1", "core.scene-v1", "core.scene-semantic-diff", "quality.m2-scene-gate"]
