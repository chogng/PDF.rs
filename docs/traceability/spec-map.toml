[[requirement]]
id = "RPE-ARCH-001/5.1-5.2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native byte access binds immutable source snapshots and pauses on bounded missing ranges without platform I/O."
features = ["core.snapshot-byte-source"]
implementation = ["core/bytes"]
tests = ["core/bytes::range_store", "core/bytes::repository_policy"]
status = "partial"
notes = "The m1.range-store.v1 bootstrap provides checked ranges, source-bound stable slices, complete response metadata validation, metadata-only and response-bound EOF discovery, one-time unknown-length binding, allocator-capacity-aware shared backing, canonical missing ranges, resumable ticket subscriptions, partial-supply deduplication, source-change poisoning, and structured resource limits without filesystem, network, async-runtime, unsafe, third-party, or external-engine dependencies. The bounded syntax, traditional-xref, and indirect-object framing jobs consume this contract with explicit phase checkpoints; object stream framing can finish from disconnected envelope and terminal-boundary ranges without the payload middle. Runtime/platform Range acquisition, request coalescing, cancellation/session arbitration and requeueing, document-level composition, deterministic model/fuzz campaigns, and browser/desktop E2E remain open; this entry does not claim M1 exit or any Native rendering/differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.3"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native syntax parsing preserves source locations and raw lexical distinctions while enforcing bounded work."
features = ["core.pdf-syntax", "core.indirect-object-framing", "core.attested-resident-footprint"]
implementation = ["core/syntax", "core/object"]
tests = ["core/syntax::parser_behavior", "core/syntax::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.syntax-core.v1 bootstrap strictly parses bounded contiguous windows for PDF headers and direct null, boolean, number, name, string, array, dictionary, indirect-reference, borrowed keyword, and strict stream-line-boundary syntax; it retains source-bound spans and raw real notation, reports incomplete windows as control flow, applies deterministic lexical and owned-memory limits, and checks cancellation at fixed loop intervals. It also reports allocator-visible array and dictionary backing capacity separately from decoded scalar bytes. The m1.indirect-object-framing.v1 bootstrap composes those primitives into an exact header-validated indirect object and directly sized stream framing job whose payload remains unread; successful envelopes carry the checked scalar-plus-container syntax heap capacity as a non-cumulative gauge. The m1.attested-resident-footprint.v1 profile propagates that successful value-owned evidence toward proof-bearing document results, but it neither measures allocator metadata or RSS nor reserves cache space. Indirect stream lengths, reference resolution, xref/document composition, object streams, repair profiles, registered fuzzing, and document services remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, or Native differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.4"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native strict base-revision composition discovers the final startxref, validates a bounded traditional xref table, and attests the complete top-level object area."
features = ["core.traditional-xref", "core.indirect-object-framing", "core.base-revision-candidate-index", "core.strict-base-revision-attestation", "core.attested-object-access", "core.attested-reference-chain-resolution", "core.attested-resident-footprint"]
implementation = ["core/xref", "core/object", "core/document"]
tests = ["core/xref::traditional_xref", "core/xref::limit_config", "core/xref::source_error_policy", "core/xref::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::limit_config", "core/object::source_error_policy", "core/object::repository_policy", "core/document::revision_index", "core/document::revision_attestation", "core/document::revision_attestation_limit_config", "core/document::attested_object_access", "core/document::reference_chain_resolution", "core/document::reference_chain_limit_config", "core/document::limit_config", "core/document::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.traditional-xref.v1 bootstrap is limited to a known-length immutable source, bounded reverse discovery of the final line-delimited startxref marker, and strict resumable parsing of one complete traditional base xref table and trailer with checked geometry and a retained full snapshot. The sibling m1.indirect-object-framing.v1 job accepts untrusted xref-derived geometry, requires a preceding PDF whitespace byte plus the exact number/generation/obj header, and frames a direct value or directly sized stream without crossing its independently supplied physical upper bound. The m1.strict-base-revision-index.v1 product composition bootstrap sorts one traditional base section's in-use offsets into checked, non-overlapping candidate physical intervals; those intervals remain untrusted until consumed by the m1.strict-base-revision-attestation.v1 job. That strict job validates one supported header at source offset zero and linearly covers the complete header-to-startxref object area: it frames every in-use candidate in physical order, accepts only PDF whitespace and line-terminated comments in the prefix and inter-object gaps, and publishes fixed-size object evidence only after every frame and gap succeeds. The m1.attested-object-access.v1 capability lets only that attested index mint bounded one-shot reopen jobs under the retained object/syntax profile and an explicit caller-lent work cap; a successful job reproduces the fixed evidence before exposing a borrowed semantic value through an attested wrapper, never a raw target, lower job, or unwrapped object. The m1.attested-reference-chain.v1 job iteratively follows only a top-level direct indirect-reference value, detects exact-reference cycles with the full closing chain, drops intermediate parsed objects, and applies job-wide object, edge, depth, path-capacity, read, and parse limits. It treats dictionaries, arrays, streams, and every other direct value as terminal and therefore is not a complete object-graph resolver. The m1.attested-resident-footprint.v1 profile exposes checked value-owned footprints for a reopened `AttestedObject` and successful `ResolvedReference`: each includes its runtime inline Rust representation and the terminal object's allocator-reported syntax heap capacity, while a resolved chain additionally includes its backing-vector capacity exactly once. These figures are cache-admission evidence only; they exclude allocator metadata, source and byte-cache storage, stream payloads, an outer cache container, reservation, eviction, and cross-job ownership. Xref streams, hybrid files, Prev chains and revision precedence, indirect Length, object streams, repair, unknown-length sources, nested semantic graph traversal, persistent Ready caching, concurrent resolution coalescing, cross-job/session aggregate work, registered fuzzing, and broader document services remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, R0 conformance, a complete resolver, or Native/PDFium semantic or pixel differential maturity."

[[requirement]]
id = "RPE-ARCH-001/15.3/M0"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "M0 quality infrastructure produces deterministic synthetic artifacts and isolates external baselines."
features = [
  "quality.minimal-pdf-generator",
  "quality.native-object-loop",
