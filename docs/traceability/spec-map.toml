id = "RPE-ARCH-001/6.1-6.2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Content interpretation consumes ordered operands and operators through an explicit table before bounded graphics, text, compatibility, marked-content, resource, and Scene semantics are applied."
