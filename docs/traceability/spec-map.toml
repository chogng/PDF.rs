notes = "M3-01 establishes the pure product crate and the PLANNED m3.reference-pixel-foundation.v1 profile. It consumes one immutable Scene and caller-selected positive device-pixel dimensions, fixes top-down opaque sRGB-reference-v1 straight-alpha RGBA8 publication, and preserves the exact Scene page/source binding. The sRGB-reference-v1 label freezes only byte order, origin, alpha representation, and empty-page white output; it is not the final reference-raster-v1 geometry, flattening, coverage, clipping, compositing, color-conversion, glyph, image, or antialiasing contract. The current Scene contains only paired marked-content commands, which are exhaustively traversed as non-painting work before a white buffer is privately built and atomically published. Independent validated ceilings cover width, height, pixels, stride, semantic output bytes, commands, command-plus-pixel fuel, allocator capacity, and allocation failure. Checked arithmetic, fallible reservation, initial, pre-allocation, fixed-interval, and pre-publication cancellation, input-Scene release, pixel-redacted diagnostics, and terminal success/failure replay are tested at exact and one-less boundaries. Product dependencies contain only the project Scene crate; repository policy rejects unsafe, filesystem, network, process, async runtime, platform graphics, browser binding, external engine, and upward dependency markers. The profile has no O0/O1 oracle registration, reviewed O3 golden, fuzz target, benchmark, capability promotion, page-to-device transform, visible graphics support, Fast/GPU path, product Surface lifecycle, or M3 exit claim, so this requirement remains partial and the feature remains PLANNED."

