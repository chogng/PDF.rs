notes = "Current executable evidence drives one real generated 612-byte PDF through the product strict-base opening entry and the one-job strict-open coordinator, covering all five parser checkpoints and upper-half-before-lower out-of-order supply. Coordinator public run_one is the only parser entry; host ingress only mutates Range state and may queue completion, never polls parser code, and leaves progress to a later exclusive actor turn. The coordinated host-failure path consumes one exact failure completion without a parser poll or cancellation probe. Ready crosses as an opaque move-only Ready handoff containing the attested index and the same private source owner; the coordinator then reports zero resources and consuming close returns exact owner-release evidence. The sibling direct lower-owner path retains arbiter-bound move-only dispatch, exact issuer/ticket/job/checkpoint/generation validation, and stale-generation rejection without parser work. Lower component suites separately cover namespaced tickets, ordered resume/failure completion, bounded snapshot bytes, syntax, traditional xref, object framing, strict opening, foreign and duplicate ingress, cancellation before late bytes, source-change rejection, idempotent close, permit mismatch cases, page counting, and outline enumeration. A separate bounded xref primitive validates complete caller-supplied unfiltered decoded xref-stream tables and preserves decoded coordinates separately from source spans; a pure revision composer validates already-parsed newest-to-oldest precedence. The staged object path now exposes direct or indirect Length declarations and resumes exact boundary validation from same-snapshot resolver metadata, including sparse Range, cancellation, and source-change tests. A bounded document resolver now connects the already-composed revision and staged-object components for effective uncompressed targets and uncompressed direct-integer indirect Length dependencies, including sparse Range, cancellation, and source-change tests. It does not acquire source revisions or filters, decode object streams, linearly attest update placement, integrate strict opening or document services, or provide complete resolver ownership. The machine-readable M1 profile ledger freezes strict R0, bounded local R1, strict page-count, and strict-outline supported/excluded surfaces while leaving all four PLANNED; its PR validator rejects paper REFERENCE or DIFFERENTIAL promotion when required cases, review, fuzz, holdout, performance, differential, or fingerprint evidence is absent. This governance gate is not implementation or maturity evidence. This is one synchronous strict-base-open component, not a complete Session. Platform Range transport, a generic multi-job scheduler with queue priority, fairness, backpressure, and a job registry, a complete Session/request/Worker owner, viewport generations, broader lifecycle model tests, registered fuzzing, and browser/desktop E2E remain open; filtered xref-stream acquisition, hybrid and incremental revision integration, object streams, and the required R0/R1 repair implementations are also absent. Strict page-count and outline features remain PLANNED, and their non-gating PDFium helpers are not registered DIFFERENTIAL evidence. This partial record therefore does not claim M1 exit."

component_notes = "The m1.xref-revision-chain.v1 component proves bounded newest-to-oldest precedence over caller-supplied traditional, primary-stream, and hybrid candidate rows, including free/null masking, source identity, anchor geometry, limits, and cancellation. The m1.staged-stream-length.v1 object component preserves indirect Length as an explicit same-snapshot dependency and resumes strict boundary validation after resolver-supplied integer metadata. The new m1.revision-aware-uncompressed-resolver.v1 document slice connects those already-composed inputs for effective uncompressed targets and uncompressed direct-integer Length dependencies, with bounded anchor retention, exact generation/no-fallback lookup, three-phase sparse Range resume, cancellation, and source-change terminal tests. It does not acquire revision sections, decode filters or object streams, linearly attest top-level placement, integrate the Session or services, or implement repair, so this is component progress rather than M1 exit evidence. All three profiles remain PLANNED."

