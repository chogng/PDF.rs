notes = "M0 exit was accepted on 2026-07-15 after the active, independently reviewed O1 synthetic case produced one exact content-addressed failure bundle containing the complete Parse, Scene, Text, and Pixel comparison artifacts plus manifest and input. CI also proves product isolation twice: a direct manifest preflight rejects forbidden dependencies, and a fresh out-of-repository release target builds only the seven product libraries before checking seven depfiles, 63 artifact files, seven fingerprint directories, and zero build-script, native, external-engine, unknown, symlink, stale, or incomplete artifacts. The external baseline deliverable is protocol v2 plus a deadline/byte-limited generic direct-child supervisor and source-only PDFium public-C-API pixel, Outline, and page-count adapters. For the M0 gate this is a process-level black box used only with fixed, self-authored, hash-bound inputs; it is not a registered baseline and is not approved for untrusted input. The bounded replayable one-page/table-xref DSL profile, canonical content-verified T0 corpus manifest, canonical non-verdict synthetic benchmark report, fixed 103-case-per-parser deterministic mutation smoke, and test-only Native formal-strict-base-open-to-proof-preserving-object-access-to-strict-page-count-to-reference-chain composition loop are also implemented. The pixel adapter retains one non-gating O1-analytic-versus-O4 probe without Native pixels. The Outline adapter performs one real, non-gating Native/PDFium O4 comparison: a valid three-item fixture matches exactly over the public observable subset, while a wrong-Prev fixture yields Native RPE-DOCUMENT-0041 and the same PDFium outline, classified as an expected strictness difference because PDFium does not expose Prev. The page-count adapter performs a separate real, non-gating comparison: valid one-page and nested three-page fixtures are exact and repeatable, while a mismatched positive root Count yields Native RPE-DOCUMENT-0033 and PDFium page_count=4 as an expected strictness difference. Its release-mode boundary-performance follow-up records all raw samples for two 50-sample 128-page trials plus exact behavior agreement, but explicitly keeps performance_eligible=false because the Native full in-memory path and PDFium cold-child protocol path are not equal engine scopes and the local machine is not a fixed performance pool. The canonical Native loop obtains page_count=1 from the product page-tree job, checks value-owned resident-footprint evidence for every reopened object and the resolved root, then uses `ReadySessionOwner` to admit the successful root, verify an exact-key borrowed warm hit, synchronously close the store, match the admitted released-resource total, observe zero post-close resources, and repeat close idempotently. This is component-level document/cache runtime integration rather than a complete Session actor, persistent caching, or cross-session reuse. The loop also observes pages_processed=1 in linked PDFium build-readiness evidence; that older equality remains a smoke observation rather than a registered page-count differential and is separate from the real page-count probe. All real semantic and boundary-performance probes remain unregistered and non-gating, all affected feature states remain PLANNED, and M1 exit is not claimed complete. Platform-enforced isolation, complete runtime/license/font/color closure, executable replacement protection, baseline-ledger registration, broad corpus and pixel differential evidence, broader DSL variants, registered coverage-guided and continuous fuzzing, automated minimization beyond the exact synthetic failure bundle, performance-eligible fixed-pool benchmark evidence, and T1+ corpus scale gates remain open as later maturity or release work; none is part of the accepted M0 exit gate."

