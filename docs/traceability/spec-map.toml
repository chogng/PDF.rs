status = "partial"
notes = "The m1.syntax-core.v1 bootstrap strictly parses bounded contiguous windows for PDF headers and direct null, boolean, number, name, string, array, dictionary, indirect-reference, borrowed keyword, and strict stream-line-boundary syntax; it retains source-bound spans and raw real notation, reports incomplete windows as control flow, applies deterministic lexical and owned-memory limits, and checks cancellation at fixed loop intervals. It also reports allocator-visible array and dictionary backing capacity separately from decoded scalar bytes. The m1.indirect-object-framing.v1 compatibility job composes those primitives into an exact header-validated indirect object and directly sized stream whose payload remains unread; successful envelopes carry the checked scalar-plus-container syntax heap capacity as a non-cumulative gauge and indirect Length remains a stable Unsupported result on that API. The sibling m1.staged-stream-length.v1 path stops after a validated stream dictionary and payload start, preserves a direct value or indirect reference plus source span, binds resolver-supplied integer metadata to the same-snapshot exact reference, and resumes bounded terminal framing at the exact checked payload end without fetching the complete payload. It does not itself resolve or attest the referenced integer. The m1.unfiltered-object-stream-resolution.v1 slice accepts only a fully framed generation-zero stream plus its exact source-bound payload, validates Type/N/First/Extends and header/index/entry geometry under explicit work limits, and publishes recursive semantic values with DecodedObjectSpan coordinates rather than physical ByteSpan values. The revision index binds each result to the latest effective uncompressed container and exact compressed xref index/object number. The m1.attested-resident-footprint.v1 profile propagates successful value-owned evidence toward proof-bearing document results, but it neither measures allocator metadata or RSS nor reserves cache space. The m1.revision-aware-uncompressed-resolver.v1 document slice resolves effective uncompressed objects and uncompressed direct-integer stream Length dependencies from an already-composed chain. The m1.source-acquired-document-services.v1 owner now consumes the move-only acquired revision proof, pre-admits its chain clone and input-derived resolver-anchor bound, and resolves latest-wins direct or generation-zero compressed objects through exact filtered or unfiltered object-stream payloads. It admits branch-specific framing, filter-plan, decoder, object-stream workspace, and semantic retained ceilings before child or source work, supports direct or effective-uncompressed indirect Length, preserves physical versus decoded coordinates, and exposes bounded page-count and outline services. Linear top-level placement attestation for updates, aliased or compressed Length values, repair-proof mixing, generic graph traversal, feature-specific broader fuzz promotion, and complete Session scheduling remain open. These bounded syntax and object slices contribute to the covered M1 byte-and-object gate; their broader feature labels remain PLANNED and this mapping does not claim ISO conformance or rendering maturity."

[[requirement]]
id = "RPE-ARCH-001/5.4"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native xref primitives discover source-bound final and revision anchors, acquire strict direct-Length traditional plus proof-bound filtered or unfiltered stream, hybrid, and incremental chains, compose bounded latest-wins revision semantics, and feed proof-preserving acquired-chain object and metadata services; product strict opening still attests only the traditional base profile."
features = ["core.strict-repair-policy", "core.local-repair", "core.traditional-xref", "core.source-xref-anchor", "core.decoded-xref-stream-table", "core.source-xref-stream-acquisition", "core.source-revision-chain-acquisition", "core.source-acquired-document-services", "core.xref-revision-chain", "core.indirect-object-framing", "core.staged-stream-length-framing", "core.revision-aware-object-resolver", "core.object-stream-resolution", "core.base-revision-candidate-index", "core.strict-base-revision-attestation", "core.strict-base-open", "core.attested-object-access", "core.attested-reference-chain-resolution", "core.attested-resident-footprint", "runtime.strict-base-open-job-owner", "runtime.strict-base-open-coordinator", "quality.native-range-resume-loop", "quality.native-strict-open-runtime-loop"]
implementation = ["core/xref", "core/object", "core/document", "runtime/session", "tools/quality"]
tests = ["core/xref::final_startxref", "core/xref::xref_anchor", "core/xref::traditional_xref", "core/xref::local_repair", "core/xref::traditional_revision", "core/xref::xref_stream", "core/xref::revision_chain", "core/xref::limit_config", "core/xref::source_error_policy", "core/xref::repository_policy", "core/object::object_behavior", "core/object::local_repair", "core/object::framing_matrix", "core/object::staged_length", "core/object::object_stream", "core/object::filtered_object_stream", "core/object::limit_config", "core/object::source_error_policy", "core/object::repository_policy", "core/document::source_xref_stream", "core/document::source_revision_chain", "core/document::revision_resolver", "core/document::compressed_resolver", "core/document::acquired_object", "core/document::acquired_services", "core/document::revision_index", "core/document::revision_attestation", "core/document::revision_attestation_limit_config", "core/document::strict_base_open", "core/document::local_repair_geometry", "core/document::local_repair_open", "core/document::attested_object_access", "core/document::reference_chain_resolution", "core/document::reference_chain_limit_config", "core/document::limit_config", "core/document::repository_policy", "runtime/session::strict_base_open_owner", "runtime/session::strict_base_open_coordinator", "runtime/session::repository_policy", "tools/quality::native_object_loop", "tools/quality::native_range_resume_loop", "tools/quality::native_strict_open_runtime_loop"]
status = "partial"
notes = "The m1.traditional-xref.v1 bootstrap is limited to a known-length immutable source, bounded reverse discovery of the final line-delimited startxref marker, and strict resumable parsing of one complete traditional base xref table and trailer with checked geometry and a retained full snapshot. The m1.source-xref-anchor.v1 slice reuses that exact final-tail discovery, then performs one bounded Range-resumable read to classify a caller-selected startxref as either a line-terminated traditional table header or an exact indirect-object header. The stream-object classification result only identifies an ObjectRef and explicit framing geometry. The separate m1.source-xref-stream-acquisition.v1 document slice now consumes that exact geometry, frames one primary or hybrid stream container, accepts direct Length, acquires one exact encoded payload under a single active Pending ticket, and preserves compatibility-unfiltered input or an opt-in strict direct Filter/DecodeParms plan. The filtered path binds that exact ByteSlice to DecodeRequest, retains the sealed DecodedStream attestation, validates the decoded table plus terminal boundary and self-entry policy, and publishes the framed container, optional decode proof, and semantic table in one non-cloneable proof. `OpenSourceRevisionChainJob` now owns final-tail discovery, exact primary and optional hybrid anchor classification, anchored traditional or source-framed stream acquisition, strict backward `/Prev` traversal, and final pure newest-to-oldest composition. The composed result preserves explicit base roots, update inheritance, and validated base hybrids under strict backward geometry. Its move-only result retains the final marker, every raw source proof, every optional sealed decode proof, and the composed latest-wins chain while exposing only one active child through one exact Pending result. Parent read, parse, decode input/output, active-retention, revision, section, entry, and publication bounds are admitted before each child can perform source work, and terminal success commits only the proof actually retained. Indirect Length remains unsupported; filtered payloads require the explicit foundational-filter constructor, and the result is not yet accepted by the strict attestation opener. The separate m1.decoded-xref-stream-table.v1 primitive exposes a strict unfiltered entry and an untrusted decoded semantic entry. Both validate source-bound dictionary metadata, including unique Type/Size/W/Index/Root/Prev fields, exact row geometry, free/uncompressed/compressed row semantics, deterministic decoded-byte/entry/index/capacity limits, cooperative cancellation, and stable recovery policy; the decoded entry requires Filter metadata but permits physical encoded length to differ from caller-supplied decoded length. Both entries represent row coordinates as relative decoded spans rather than physical source ByteSpan values. The decoded entry does not interpret the filter plan or mint decode proof; an owning document composition must retain a sealed DecodedStream attestation before using its semantic table. It does not acquire or frame the containing indirect object, validate Length, decode filters, resume over missing bytes, follow Prev, merge a hybrid XRefStm supplement, or publish revision precedence. The sibling m1.indirect-object-framing.v1 job accepts untrusted xref-derived geometry, requires a preceding PDF whitespace byte plus the exact number/generation/obj header, and frames a direct value or directly sized stream without crossing its independently supplied physical upper bound. The m1.staged-stream-length.v1 path can instead stop at the stream payload start, expose a direct or indirect Length declaration, bind later resolver-supplied same-snapshot integer metadata, and resume exact boundary framing without reading the opaque payload in full. The m1.unfiltered-object-stream-resolution.v1 path requires a fully framed generation-zero container plus its exact source-bound payload; it validates Type/N/First/Extends, unique object numbers, strictly increasing offsets beginning at zero, exact one-object entry slots, actual retained/working capacity, and cancellation. Its recursive semantic values expose only DecodedObjectSpan coordinates. `RevisionObjectIndex::resolve_compressed` then rechecks the latest effective uncompressed container's snapshot, generation, offset, bound, revision anchor, payload containment, compressed index, and object number before returning a proof-preserving borrow. The m1.strict-base-revision-index.v1 product composition bootstrap sorts one traditional base section's in-use offsets into checked, non-overlapping candidate physical intervals; those intervals remain untrusted until consumed by the m1.strict-base-revision-attestation.v1 job. That strict job validates one supported header at source offset zero and linearly covers the complete header-to-startxref object area: it frames every in-use candidate in physical order, accepts only PDF whitespace and line-terminated comments in the prefix and inter-object gaps, and publishes fixed-size object evidence only after every frame and gap succeeds. The m1.strict-base-open.v1 job is the product entry that composes xref discovery, candidate construction, and attestation under one JobId and five distinct checkpoints. It preserves complete lower xref or document errors and cumulative phase accounting, propagates Pending without double charging, and publishes only the sealed `AttestedRevisionIndex`; neither the xref section nor candidate index crosses the entry boundary. The m1.strict-base-open-job-owner.v1 runtime slice exclusively retains one such job and its fixed generation. Resume execution and source-failure disposition require exact arbiter, ticket, job, checkpoint, and generation identity; stale or foreign permits are consumed without polling. The m1.strict-base-open-coordinator.v1 component privately composes that owner with one Range arbiter, makes public run_one the only parser entry, registers Pending before returning it, and consumes each queued resume or failure completion in the same exclusive actor turn that updates the owner. Host ingress never polls. Ready crosses the boundary only as an opaque move-only handoff containing the attested index and the same private source owner; consuming close returns retained-owner release evidence. Component and generated-PDF quality tests cover all five checkpoints. The component suites cover reverse physical delivery, cancellation in both child layers, source mismatch precedence, terminal replay, foreign and same-number tickets, stale or mismatched permit rejection, failure completion without parser or cancellation polling, and cancel/source-change/close release. The m1.attested-object-access.v1 capability lets only that attested index mint bounded one-shot reopen jobs under retained profiles and a caller-lent work cap. The m1.attested-reference-chain.v1 job follows only top-level whole-object aliases with exact cycle chains and aggregate limits. The m1.attested-resident-footprint.v1 profile exposes checked value-owned footprint evidence for later cache admission, while separate runtime cache/owner primitives remain isolated. The m1.revision-aware-uncompressed-resolver.v1 slice derives bounded anchors from an already-composed chain, preserves latest-wins free/null/generation states without fallback, frames effective uncompressed objects, and resolves indirect Length only through an effective uncompressed direct nonnegative integer. Proof-bound filtered object-stream decoding is available for an exactly framed container, exact encoded ByteSlice, re-canonicalized source dictionary, and sealed matching decode attestation. The m1.source-acquired-document-services.v1 owner now consumes the complete acquired chain, retains its raw and decode proofs plus a private latest-wins resolver index, schedules exact filtered or unfiltered object-stream payload reads, resolves effective direct or compressed values and effective-uncompressed indirect Length, and lends bounded page-count and outline jobs without erasing physical or decoded coordinates. Owner and branch-specific child retained bounds, including object-stream parser workspace, are admitted before clone, index, child, or source work, and aggregate reads and parses remain capped. The owner does not linearly attest update placement or convert acquired proof into strict or repaired typestate. Repair integration, compressed or aliased Length, unknown-length sources, general graph traversal, persistent reuse or coalescing, a generic scheduler and complete Session, viewport generations, and feature-specific broader fuzz promotion remain open. These bounded xref and object services contribute to the covered M1 byte-and-object gate; their broader feature labels remain PLANNED and this mapping does not claim ISO conformance, a release profile, or Native/PDFium pixel maturity."

component_notes = "The m1.xref-revision-chain.v1 pure composer consumes already-parsed candidates newest-to-oldest and validates one immutable snapshot, exact backward primary Prev links, nondecreasing Size, complete traditional base versus sparse updates, primary-stream self anchors, hybrid geometry, unique anchors, stable limits, and cancellation. Lookup order is current traditional primary, current hybrid supplement, then the older primary; primary free and xref-stream unknown-type null rows hide older definitions. The m1.source-revision-chain-acquisition.v1 parent supplies those candidates from exact final-tail, traditional, compatibility-unfiltered or opt-in proof-bound filtered primary-stream, hybrid, and incremental source proofs under one active Pending child and pre-admitted aggregate decode/work/retention bounds. The m1.staged-stream-length.v1 object component exposes bounded Range-resumable direct or resolver-supplied same-snapshot Length framing. The m1.revision-aware-uncompressed-resolver.v1 document slice connects those inputs for effective uncompressed targets and direct-integer Length dependencies. The object-stream primitives bind either an exact unfiltered source payload or a sealed matching filtered decode proof to decoded-only entry coordinates, then verify each compressed xref row against the latest effective generation-zero container, exact index, and embedded object number. These xref-derived intervals plus local checks do not linearly attest update placement. The strict base parser still rejects sparse incremental tables and XRefStm even though the separate source-chain job can now acquire complete direct-Length traditional plus proof-bound filtered or unfiltered stream, hybrid, and incremental chains under exact bounds. The source-acquired document owner now provides proof-preserving filtered or unfiltered compressed-object acquisition and page-count/outline service integration over that chain; it does not add linear update-placement attestation or convert the chain into strict or repaired proof. Indirect or compressed stream Length beyond an effective uncompressed integer, repair or strict-open integration, generic graph ownership, and complete scheduler or Session ownership remain open. The broad xref and acquired-chain component profiles remain PLANNED; their bounded executable slices contribute to the covered M1 gate without claiming linear update-placement attestation, generic graph ownership, or complete scheduler and Session ownership."

