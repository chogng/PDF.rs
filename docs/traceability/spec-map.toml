  "tools/generate",
  "tools/compare",
  "tools/quality",
  "tools/baseline",
  "tools/benchmark",
  "tools/corpus",
]
tests = [
  "infrastructure/synthetic-failure-bundle-001",
  "tools/baseline::tests",
  "tools/baseline::process_harness",
  "tools/baseline::pdfium_adapter_contract",
  "tools/baseline::pdfium_real_adapter",
  "tools/baseline::repository_pdfium_probe",
  "tools/corpus/src/manifest.rs::tests",
  "tools/corpus/tests/cli.rs",
  "tools/corpus/tests/repository_manifest.rs",
  "tools/benchmark/src/report.rs::tests",
  "tools/benchmark/tests/cli.rs",
  "tools/benchmark/tests/repository_report.rs",
  "tools/quality/tests/parser_mutation_smoke.rs",
  "tools/quality::native_object_loop",
]
status = "partial"
notes = "Synthetic parse/Scene/Text/Pixel bundles, baseline protocol v2, a deadline/byte-limited generic direct-child supervisor, a source-only PDFium public-C-API pixel adapter with one non-gating O4 probe, a bounded replayable one-page/table-xref DSL profile, a canonical content-verified T0 corpus manifest, a canonical non-verdict synthetic benchmark report, a fixed 103-case-per-parser deterministic mutation smoke, and a test-only Native xref-to-candidate-to-attested-base-revision-to-proof-preserving-object-access-to-reference-chain composition loop are implemented. The Native loop also checks the runtime component relationships of value-owned resident-footprint evidence for every reopened object and the resolved root without treating the measurement as a cache-admission decision or RSS. It binds its generated input identity to the existing PDFium O4 record but does not compare semantic or pixel outputs. Platform-enforced isolation, complete runtime/license/font/color closure and baseline-ledger registration, Native/PDFium differential evidence, broader DSL variants, registered coverage-guided and continuous fuzzing, automated minimization/failure bundles, measured benchmark evidence, and T1+ corpus scale gates remain open."

