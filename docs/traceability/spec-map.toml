status = "partial"
notes = "The m2.content-operator-scanner.v1 foundation remains a pure scanner over already-decoded, caller-ordered Page content streams. It validates exact zero-based stream order, owns bounded PDF scalar and container operands, treats stream boundaries as semantic whitespace, retains exact decoded-coordinate and page-global operator provenance, and separates known table entries, lexically valid unknown operators, and malformed content. The table declares token, operand shape, context, base fuel, and failure policy for q, Q, cm, BT, ET, BX, EX, MP, DP, BMC, BDC, and EMC. The sealed m2.content-vm-scene-v1 interpreter consumes one strict-attested AcquiredPageContent rather than accepting a separately supplied program and Page, runs the scanner internally, validates operand shapes before state mutation or unsupported classification, executes q/Q/cm, BT/ET, BX/EX, BMC, name-based BDC, and EMC, and atomically publishes a Scene-bound InterpretedPage. It enforces independent operator, fuel, graphics-depth, compatibility-depth, marked-depth, property-use, allocation, and retained-state limits in addition to unchanged lower scanner, document-property, and Scene budgets. Unknown operators are ignored only inside compatibility sections and are otherwise Unsupported; MP, DP, direct BDC property dictionaries, indirect Page /Properties dictionaries, and direct selected property dictionaries are explicit Unsupported outcomes after required validation. The two resource-based Unsupported values retain their original lower DocumentError, while malformed resource syntax and all scanner, document, and Scene failures remain unflattened lower errors. Source change precedes cancellation, all non-Ready paths suppress partial Scene publication, and terminal outcomes replay without more work. Inline images, Forms, paths, painting, text showing, fonts, images, general graphics state, and broad content compatibility remain outside this partial architecture mapping even though M2-06 is complete."

