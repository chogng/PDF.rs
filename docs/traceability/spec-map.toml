[[requirement]]
id = "RPE-ARCH-001/5.1-5.2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native byte access binds immutable source snapshots and pauses on bounded missing ranges without platform I/O."
features = ["core.snapshot-byte-source"]
implementation = ["core/bytes"]
tests = ["core/bytes::range_store", "core/bytes::repository_policy"]
status = "partial"
notes = "The m1.range-store.v1 bootstrap provides checked ranges, source-bound stable slices, complete response metadata validation, metadata-only and response-bound EOF discovery, one-time unknown-length binding, allocator-capacity-aware shared backing, canonical missing ranges, resumable ticket subscriptions, partial-supply deduplication, source-change poisoning, and structured resource limits without filesystem, network, async-runtime, unsafe, third-party, or external-engine dependencies. Runtime/platform Range acquisition, request coalescing, cancellation/session arbitration, parser checkpoints, syntax/xref/object consumers, deterministic model/fuzz campaigns, and browser/desktop E2E remain open; this entry does not claim M1 exit or any Native rendering/differential maturity."

[[requirement]]
id = "RPE-ARCH-001/15.3/M0"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "M0 quality infrastructure produces deterministic synthetic artifacts and isolates external baselines."
features = [
  "quality.minimal-pdf-generator",
  "quality.canonical-diff",
  "quality.failure-bundle",
  "quality.baseline-protocol-boundary",
  "quality.benchmark-harness",
  "quality.corpus-manager",
]
implementation = [
  "tools/generate",
  "tools/compare",
  "tools/quality",
  "tools/baseline",
  "tools/benchmark",
  "tools/corpus",
]
tests = [
  "infrastructure/synthetic-failure-bundle-001",
  "tools/baseline::tests",
  "tools/baseline::process_harness",
  "tools/baseline::pdfium_adapter_contract",
  "tools/baseline::pdfium_real_adapter",
  "tools/baseline::repository_pdfium_probe",
  "tools/corpus/src/manifest.rs::tests",
  "tools/corpus/tests/cli.rs",
  "tools/corpus/tests/repository_manifest.rs",
  "tools/benchmark/src/report.rs::tests",
  "tools/benchmark/tests/cli.rs",
  "tools/benchmark/tests/repository_report.rs",
  "tools/quality/tests/parser_mutation_smoke.rs",
]
status = "partial"
notes = "Synthetic parse/Scene/Text/Pixel bundles, baseline protocol v2, a deadline/byte-limited generic direct-child supervisor, a source-only PDFium public-C-API pixel adapter with one non-gating O4 probe, a bounded replayable one-page/table-xref DSL profile, a canonical content-verified T0 corpus manifest, a canonical non-verdict synthetic benchmark report, and a fixed 103-case-per-parser deterministic mutation smoke are implemented. Platform-enforced isolation, complete runtime/license/font/color closure and baseline-ledger registration, Native/PDFium differential evidence, broader DSL variants, registered coverage-guided and continuous fuzzing, automated minimization/failure bundles, measured benchmark evidence, and T1+ corpus scale gates remain open."

[[requirement]]
id = "RPE-ARCH-001/12.6"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Project-authored fixture DSL generation is deterministic, readable, replayable, and extensible across structural PDF variants."
features = ["quality.minimal-pdf-generator"]
implementation = ["tools/generate"]
tests = ["tools/generate::tests", "tools/quality/tests/parser_mutation_smoke.rs", "infrastructure/synthetic-failure-bundle-001"]
status = "partial"
notes = "The bounded m0.one-page-table.v1 profile compiles one PDF 1.7 page with configurable MediaBox/content and a traditional xref table; a fixed anchor-based mutation smoke checks repeatable bounded parser outcomes. The wider xref, object-stream, filter, revision, encryption, corruption, registered fuzz target, coverage gate, and automatic minimizer dimensions remain open."

[[requirement]]
