tests = ["core/document::page_index", "core/document::page_materialization", "core/document::page_properties", "core/document::page_content", "core/document::repository_policy", "core/content::scanner", "core/content::vm", "core/content::repository_policy", "core/scene::scene_v1", "core/scene::scene_diff", "core/scene::repository_policy", "tools/quality::m2_scene_gate", "tools/quality::m2_exit"]
status = "covered"
notes = "M2 execution is defined in plan/m2.toml and the bounded milestone completed on 2026-07-16. M2-01 provides the sealed immutable PageIndex admission boundary. M2-02 is complete: strict and locally repaired borrowed or owned jobs cold-open only Catalog/root structure, retain a bounded immutable segmented frontier, distinguish DeclaredCount, ValidatedPartition, and CompleteSubtree evidence, lazily validate requested descendant ranges, and publish source- and revision-bound PageHandles with stable cancellation, source-change, stale-handle, topology, budget, and terminal-replay outcomes. M2-03 is complete: PageHandle materialization walks only the exact validated leaf-to-root chain, selects the nearest non-null MediaBox, CropBox, Rotate, and Resources values, preserves complete defining and whole-value-alias provenance, and retains one terminal proof-bearing resource dictionary without ancestor merging. Acquired-chain page indexing/materialization/content acquisition and nested component aliases remain outside these bounded document profiles. M2-04 is complete as a foundation: immutable Scene v1 owns exact page geometry, ordered marked-content commands, first-use property resources, feature tags, paired command provenance, bounded retained capacity, source-noise-free canonical JSON, and an independent bounded semantic diff. M2-05 is complete as two bounded PLANNED profiles: strict-attested Page content acquisition retains ordered exact physical, filter, and decoded proof, while the pure scanner retains decoded coordinates and separates malformed syntax, known operators, and lexically valid unknown operators. M2-06 is complete as two additional bounded PLANNED profiles. The no-I/O page-property resolver scans only the retained direct resource dictionary, independently bounds lookups and entry visits, retains exact occurrence provenance, and never opens the selected target. The sealed Content VM consumes only strict-attested AcquiredPageContent, runs the scanner internally, validates operands before policy, executes q/Q/cm, BT/ET, BX/EX, BMC, name-based BDC, and EMC, emits the bounded marked-content Scene subset, and enforces independent operator, fuel, graphics, compatibility, marked-content, property-use, allocation, and retention budgets. Unknown operators are ignored only inside compatibility sections; unknown operators outside compatibility, MP, DP, direct content property dictionaries, indirect Page /Properties dictionaries, and direct selected property dictionaries are structured Unsupported outcomes. Resource-based Unsupported outcomes retain their original lower DocumentError, while malformed resource syntax and scanner, document, and Scene failures remain unflattened. Source change and cancellation are checked throughout, partial Scene publication is suppressed, and terminal outcomes replay exactly. M2-07 completes the bounded exit with six hash-bound normative cases, two canonical Scene goldens, a stable canonical result hash, four fresh debug/release replays, three recursive byte comparisons, and repository-only m2_exit validation. Independent parser-security and spec-conformance review returned SHIP with no open P0-P2 findings after correcting cm composition to current multiplied by operand and eliminating arbitrary recursive output deletion; a sentinel in a rejected nonempty output root remained unchanged. Paths, painting, clipping, full graphics state, text showing, fonts, glyphs, images, Forms, broader resources, acquired-chain document variants, schema/IPC, renderer adapters, general ISO compatibility, wider fuzz/corpus coverage, and fixed-pool performance remain outside the bounded M2 claim. All nine M2 feature records remain PLANNED, so milestone completion is not REFERENCE, DIFFERENTIAL, CANARY, or release promotion. The accepted M1 page-tree implementation and page-tree-count test remain byte-for-byte unchanged."

