notes = "The bounded M2 profile supports only name-based BDC whose current inherited Resources value contains a direct /Properties dictionary and a uniquely named indirect-reference entry. The document resolver performs no source read and does not open the target; it returns exact fixed-size occurrence proof under independent lookup and entry-visit budgets. The VM checks property-use and retained-state budgets before lookup, preserves ordinary lower document and Scene errors without remapping, maps indirect /Properties and direct selected dictionaries to structured Unsupported values retaining their lower DocumentError, and reports a direct content-stream property dictionary as a separate Unsupported kind. Property dictionary contents, indirect /Properties dictionaries, direct selected dictionaries, optional-content evaluation, and general marked-content property semantics remain unsupported."

[[requirement]]
id = "ISO-32000-1:2008/12.3.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Document outlines form parent-owned linked lists with text titles and recursively defined signed visible-item counts."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::outline_limit_config", "core/document::local_repair_open", "core/document::repository_policy", "tools/baseline::pdfium_outline_real_adapter", "tools/baseline::repository_pdfium_outline_probe"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap reopens every root and item dictionary through one proof-preserving strict or locally repaired index, validates paired First and Last boundaries, exact Parent and Prev links, initial Prev and terminal Next shape, global uniqueness and cycles, and recomputes signed item and nonnegative root Count values without trusting them for allocation or traversal. A nonempty root requires Count equal to all visible items, including closed top-level items themselves but excluding their hidden descendants; an empty root requires Count omission. It emits a bounded owned preorder with decoded direct text-string titles and direct Dest-or-A target kind but never executes an action. Limits cover items, depth, siblings, child object work, title input and UTF-8 capacity, and allocator-reported result/traversal storage; title output is measured before aggregate allocation checks, cancellation is cooperative, and diagnostics are content-redacted. Section 7.3.10 permits indirect outline-root Type and indirect Title, Count, Dest, and A forms, but this bootstrap returns UnsupportedOutlineRepresentation before dereferencing and therefore does not judge the referenced target valid. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly for a valid three-item fixture over preorder depth, normalized title, signed item Count, and target kind; a wrong-Prev fixture yields Native RPE-DOCUMENT-0041 while PDFium still produces the outline, an expected difference because its public API does not expose Prev. Root Count, Last, Parent, Prev, raw target shape, and invalid-empty distinctions remain outside that external observable surface. Styles, destination resolution, action interpretation, indirect-null equivalence, and broad ISO compatibility remain open. The project-owned O0/O1/O2, disjoint holdout, fuzz/minimizer, benchmark, fingerprint, and full-session graph registers this bounded outline profile at DIFFERENTIAL; baseline-ledger registration and platform-enforced isolation remain open for external O4 probes, which are not correctness oracles. This mapping contributes to bounded M1 exit without claiming ISO conformance or M2."

[[requirement]]
id = "RPE-ARCH-001/5.1-5.2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native byte access binds immutable source snapshots and pauses on bounded missing ranges without platform I/O."
features = ["core.snapshot-byte-source", "runtime.range-request-coalescer", "runtime.range-loopback-http-e2e", "runtime.range-resume-arbiter", "runtime.strict-base-open-job-owner", "runtime.strict-base-open-coordinator", "runtime.m1-strict-document-session", "quality.native-range-resume-loop", "quality.native-strict-open-runtime-loop"]
implementation = ["core/bytes", "runtime/session", "tools/quality"]
tests = ["core/bytes::range_store", "core/bytes::repository_policy", "runtime/session::range_coalescer", "runtime/session::range_loopback_http", "runtime/session::range_resume", "runtime/session::strict_base_open_owner", "runtime/session::strict_base_open_coordinator", "runtime/session::m1_strict_document_session", "runtime/session::repository_policy", "tools/quality::native_range_resume_loop", "tools/quality::native_strict_open_runtime_loop"]
status = "partial"
notes = "The m1.range-store.v1 bootstrap provides checked ranges, source-bound stable slices, complete response metadata validation, metadata-only and response-bound EOF discovery, one-time unknown-length binding, allocator-capacity-aware shared backing, canonical missing ranges, resumable ticket subscriptions, partial-supply deduplication, source-change poisoning, and structured resource limits without filesystem, network, async-runtime, unsafe, third-party, or external-engine dependencies. Every DataTicket carries a private RangeStore namespace, so a same-number ticket from another store is rejected. The m1.range-resume-arbiter.v1 runtime slice privately owns one such store; the runtime caller registers each returned Pending ticket with its job, checkpoint, and generation, and a unified ordered completion stream yields either an arbiter-bound move-only resume permit or an exact ticket-local source-failure permit. Host supply, snapshot observation, and ticket failure only mutate Range state and may queue completion; they never invoke parser code inline. Cancellation preserves shared waiters, while close, source change, and invariant failure drop the store and precharged registration metadata into stable zero-current-resource terminals. The m1.strict-base-open-job-owner.v1 slice privately owns one strict-open job and consumes only identity-matching resume or failure permits; stale or mismatched permits are consumed without parser work. The m1.strict-base-open-coordinator.v1 synchronous component privately composes exactly one Range arbiter and one strict-open owner. Its public run_one method is the only parser entry, closes each poll-to-Pending registration and completion-to-permit-consumption sequence inside one exclusive actor turn, and keeps every host ingress parser-free. Accepted bytes or ticket failure may queue later work, while integrity mismatch tears down synchronously. A queued host failure becomes SourceUnavailable without polling the parser or probing cancellation. Ready publishes one opaque move-only handoff containing the AttestedRevisionIndex and the same private source owner, so cached bytes remain owned until the handoff is transferred or its consuming close returns retained-owner release evidence. Component tests cover foreign, duplicate, late, cancellation, source-change, close, and terminal-precedence cases; the generated 612-byte quality path covers the exact five checkpoints, upper-half-before-lower out-of-order delivery, non-inline ingress, failure without a parser poll, and exact source-owner release evidence. The sibling m1.range-request-coalescer.v1 pure planner binds exact requests to one snapshot, deterministically merges overlap or a gap strictly below a caller threshold, promotes the highest member priority, retains exact request identities, and bounds checked request/group/member/byte work without issuing transport or completing tickets. Platform Range transport and acquisition, host submission/cancellation and integration of planned groups with DataTicket completion, a generic multi-job scheduler with priority, fairness, backpressure, and generation registry, complete Session/request/Worker ownership, viewport generations, broader lifecycle model tests, allocator metadata beyond explicitly reported backing/capacity, broader fuzz campaigns, and browser/desktop E2E remain open. These component labels remain PLANNED, while their bounded executable Range disorder, cancellation, and source-change behavior contributes to the covered M1 gate without claiming product transport, rendering, or general scheduler maturity."

component_notes = "The bounded M1 strict-document actor now owns the existing strict opener and its Range source through Created, Opening, WaitingForData, Ready, Closing, Closed, and Failed. Reverse partial responses and ticket-local host failure exercise accepted queueing; exact cancellation and source revision change synchronously tear down owners. Every ingress path is parser-free, and only a later run_one actor turn may poll parser code. A test-only std::net loopback host now consumes coalescer plans as real HTTP Range requests with a strong ETag and If-Range, routes exact members in reverse order, proves parser-free ingress, rejects a real late 206 after cancellation, and reports the changed strong validator/revision observed on a 200 response so the actor commits SourceChanged with zero retained resources. It is deterministic repository E2E evidence, not product transport, a reusable HTTP adapter, a host request lifecycle, cross-session arbitration, browser/desktop integration, or a generic scheduler/Worker registry."

[[requirement]]
id = "RPE-ARCH-001/5.3"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native syntax parsing preserves source locations and raw lexical distinctions while enforcing bounded work."
features = ["core.strict-repair-policy", "core.local-repair", "core.pdf-syntax", "core.indirect-object-framing", "core.staged-stream-length-framing", "core.revision-aware-object-resolver", "core.object-stream-resolution", "core.source-acquired-document-services", "core.attested-resident-footprint"]
