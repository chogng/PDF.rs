[[requirement]]
id = "RPE-ARCH-001/5.3"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native syntax parsing preserves source locations and raw lexical distinctions while enforcing bounded work."
features = ["core.pdf-syntax", "core.indirect-object-framing", "core.attested-resident-footprint"]
implementation = ["core/syntax", "core/object"]
tests = ["core/syntax::parser_behavior", "core/syntax::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.syntax-core.v1 bootstrap strictly parses bounded contiguous windows for PDF headers and direct null, boolean, number, name, string, array, dictionary, indirect-reference, borrowed keyword, and strict stream-line-boundary syntax; it retains source-bound spans and raw real notation, reports incomplete windows as control flow, applies deterministic lexical and owned-memory limits, and checks cancellation at fixed loop intervals. It also reports allocator-visible array and dictionary backing capacity separately from decoded scalar bytes. The m1.indirect-object-framing.v1 bootstrap composes those primitives into an exact header-validated indirect object and directly sized stream framing job whose payload remains unread; successful envelopes carry the checked scalar-plus-container syntax heap capacity as a non-cumulative gauge. The m1.attested-resident-footprint.v1 profile propagates that successful value-owned evidence toward proof-bearing document results, but it neither measures allocator metadata or RSS nor reserves cache space. Indirect stream lengths, reference resolution, xref/document composition, object streams, repair profiles, registered fuzzing, and document services remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, or Native differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.4"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native strict base-revision composition discovers the final startxref, validates a bounded traditional xref table, and attests the complete top-level object area."
features = ["core.traditional-xref", "core.indirect-object-framing", "core.base-revision-candidate-index", "core.strict-base-revision-attestation", "core.attested-object-access", "core.attested-reference-chain-resolution", "core.attested-resident-footprint"]
implementation = ["core/xref", "core/object", "core/document"]
tests = ["core/xref::traditional_xref", "core/xref::limit_config", "core/xref::source_error_policy", "core/xref::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::limit_config", "core/object::source_error_policy", "core/object::repository_policy", "core/document::revision_index", "core/document::revision_attestation", "core/document::revision_attestation_limit_config", "core/document::attested_object_access", "core/document::reference_chain_resolution", "core/document::reference_chain_limit_config", "core/document::limit_config", "core/document::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.traditional-xref.v1 bootstrap is limited to a known-length immutable source, bounded reverse discovery of the final line-delimited startxref marker, and strict resumable parsing of one complete traditional base xref table and trailer with checked geometry and a retained full snapshot. The sibling m1.indirect-object-framing.v1 job accepts untrusted xref-derived geometry, requires a preceding PDF whitespace byte plus the exact number/generation/obj header, and frames a direct value or directly sized stream without crossing its independently supplied physical upper bound. The m1.strict-base-revision-index.v1 product composition bootstrap sorts one traditional base section's in-use offsets into checked, non-overlapping candidate physical intervals; those intervals remain untrusted until consumed by the m1.strict-base-revision-attestation.v1 job. That strict job validates one supported header at source offset zero and linearly covers the complete header-to-startxref object area: it frames every in-use candidate in physical order, accepts only PDF whitespace and line-terminated comments in the prefix and inter-object gaps, and publishes fixed-size object evidence only after every frame and gap succeeds. The m1.attested-object-access.v1 capability lets only that attested index mint bounded one-shot reopen jobs under the retained object/syntax profile and an explicit caller-lent work cap; a successful job reproduces the fixed evidence before exposing a borrowed semantic value through an attested wrapper, never a raw target, lower job, or unwrapped object. The m1.attested-reference-chain.v1 job iteratively follows only a top-level direct indirect-reference value, detects exact-reference cycles with the full closing chain, drops intermediate parsed objects, and applies job-wide object, edge, depth, path-capacity, read, and parse limits. It treats dictionaries, arrays, streams, and every other direct value as terminal and therefore is not a complete object-graph resolver. The m1.attested-resident-footprint.v1 profile exposes checked value-owned footprints for a reopened `AttestedObject` and successful `ResolvedReference`: each includes its runtime inline Rust representation and the terminal object's allocator-reported syntax heap capacity, while a resolved chain additionally includes its backing-vector capacity exactly once. The core figures remain cache-admission evidence only: they exclude allocator metadata, source and byte-cache storage, stream payloads, an outer cache container, and every ownership or eviction decision. The separate m1.session-ready-store.v1 runtime primitive consumes that evidence for a bounded session-only borrowed-value Ready store, and the isolated m1.ready-session-owner.v1 slice now owns and drops one such store without changing `core/document` ownership. Xref streams, hybrid files, Prev chains and revision precedence, indirect Length, object streams, repair, unknown-length sources, nested semantic graph traversal, persistent Ready caching and cross-session reuse, in-flight concurrent resolution coalescing, full runtime/session-close ownership beyond the Ready store, parent budget hierarchy, cross-job/session aggregate work, registered fuzzing, and broader document services remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, R0 conformance, a complete resolver, or Native/PDFium semantic or pixel differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.8-5.9"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native strict-base document composition provides bounded text strings, outline enumeration, and complete Page/Pages validation, including PageTreeCountMismatch for inconsistent Count values."
features = ["core.pdf-text-string", "core.strict-outline", "core.strict-page-count"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::outline_limit_config", "core/document::page_tree_count", "core/document::page_tree_limit_config", "core/document::repository_policy", "tools/baseline::pdfium_outline_real_adapter", "tools/baseline::pdfium_page_count_real_adapter", "tools/baseline::repository_pdfium_outline_probe", "tools/baseline::repository_pdfium_page_count_probe", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.pdf-text-string.v1 foundation decodes bounded PDFDocEncoding and BOM-selected UTF-16BE values under the hash-pinned ISO clauses without normalization or lossy replacement. The m1.strict-outline.v1 bootstrap consumes the same proof-preserving strict-base boundary to lazily enumerate a bounded direct-value outline, validate its linked-list topology and recursively recomputed item/root Count semantics, and retain redacted owned titles without executing actions. Direct null optional fields are omitted; indirect semantic fields and indirect-null equivalence and destination resolution remain open. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly on a valid three-item observable subset and records the expected wrong-Prev strictness difference; it is not a registered baseline or correctness oracle and cannot observe the strict root/link/raw-target surface. The m1.strict-page-count.v1 bootstrap requires a direct trailer-root Catalog with unique Type and Pages fields, explicit Page/Pages node types, exact Parent back-links, direct Kids reference arrays, and nonnegative Count values. A deterministic preallocated open-addressing table and bounded active path distinguish cycles from duplicate children; a postorder traversal compares every declared Count with validated leaf Pages and never uses untrusted Count or Kids data for allocation. Per-job limits cover nodes, depth, leaf pages, per-node children, aggregate child reads/parses, and actual traversal backing capacity; Pending polls preserve lower charging, cancellation is cooperative, and traversal storage is released before terminal publication. A separate pinned, non-gating PDFium page-count helper performs a real Native/PDFium O4 comparison: valid one-page and nested three-page fixtures match exactly and repeat byte-for-byte, while an otherwise identical nested fixture whose positive root Count is 4 instead of the recomputed 3 yields Native RPE-DOCUMENT-0033 and PDFium page_count=4, classified as an expected strictness difference. The canonical Native loop separately obtains page_count=1 and observes pages_processed=1 in linked same-input PDFium build-readiness pageinfo; that older equality remains a non-gating smoke observation with differential_eligible=false rather than a registered page-count differential. The real page-count probe is also unregistered and non-gating, so it is not a registered page-count differential; the feature state remains PLANNED, and neither observation is a product verdict. The results remain closed-world strict-base summaries rather than revision-chain, repair, lazy PageIndex, page-handle, inherited-resource, persistent outline, or general PDF compatibility services; they do not claim M1 or M2 exit."

[[requirement]]
id = "RPE-ARCH-001/9.1"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "A single logical Document actor owns bounded mutable Ready-cache metadata and lends immutable successful values through complete session keys."
features = ["runtime.session-ready-store", "runtime.ready-session-owner"]
implementation = ["runtime/cache", "runtime/session"]
tests = ["runtime/cache::ready_store", "runtime/cache::repository_policy", "runtime/session::ready_owner", "runtime/session::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.session-ready-store.v1 primitive gives `runtime/cache` ownership of complete-key, accounting, admission, and deterministic bounded LRU semantics. It stores only successful immutable `ResolvedReference` values and lends an exact-key borrowed warm hit through exclusive mutation by one logical Document actor. Each session binding and key captures an opaque session identity, full source snapshot, attested revision and startxref, object and syntax profiles, requested root, exact reference-chain limits, and a caller-supplied cache epoch. Construction preallocates and charges fixed entry metadata within a checked owner ceiling; admission charges retained value heap, preserves rejected move-only values, and checks cancellation. The m1.ready-session-owner.v1 slice in `runtime/session` privately owns exactly one store, rejects lookup, admission, binding, and stats with stable `SessionClosed` after close, returns move-only values on lifecycle failure, and synchronously drops values plus fixed metadata before returning an idempotent close report. Its post-close resource snapshot is zero; released byte counts are allocator-capacity ownership evidence, not RSS evidence. The canonical `tools/quality::native_object_loop` now resolves the generated catalog, admits it through the owner, validates the exact-key borrowed warm hit and catalog semantics, then closes the owner. The close report exactly matches the admitted resident total, post-close resources are zero, and repeated close returns the same report. This is executable Ready-store runtime close ownership, not a full Session actor. Persistent caching, cross-session reuse, request drain and late-result arbitration, `SessionClosed` event publication, session ID allocation and Worker-epoch non-reuse, parent Worker/Session budget integration, in-flight resolution coalescing, concurrent shards, stable-failure caching, and the small-object retention policy described by section 9.4 remain open. The canonical loop does not provide a Native/PDFium semantic or pixel differential. This partial mapping does not claim the full runtime actor, scheduler, lifecycle, multi-level cache, or M1 exit."

