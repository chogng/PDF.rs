status = "partial"
notes = "The m1.strict-outline.v1 bootstrap lazily interprets a unique non-null Catalog Outlines field only when outline enumeration is requested. A missing or null field returns an empty outline; a present value must be an exact indirect reference reopened through the attested revision. Page counting deliberately does not inspect this optional service field. Catalog aliases, acquired revision chains, and a persistent Catalog cache remain unsupported; a locally repaired proof may own the same service without erasing its ledger, so this entry is partial."

[[requirement]]
id = "ISO-32000-1:2008/7.7.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "A page tree is rooted by the Catalog Pages entry and recursively relates Page and Pages nodes with parent links, child arrays, and descendant counts."
features = ["core.strict-page-count", "core.ordered-page-index", "core.inherited-page-values", "core.page-content-acquisition"]
implementation = ["core/document"]
tests = ["core/document::page_tree_count", "core/document::page_tree_limit_config", "core/document::page_index", "core/document::page_materialization", "core/document::page_content", "core/document::local_repair_open", "core/document::acquired_services", "core/document::repository_policy", "tools/quality::m1_document_service_differential", "tools/quality::m1_document_service_maturity", "tools/quality::m1_document_service_fuzz"]
status = "partial"
notes = "The registered m1.strict-page-count.v1 profile validates the selected bounded direct Page/Pages topology, exact Parent links, cycles, duplicate children, and recomputed Count equality through proof-preserving strict, locally repaired, and acquired-chain services. Project-owned O0/O1/O2, two disjoint holdouts, bounded libFuzzer/cmin evidence, a same-Native-scope raw timing distribution, and an independently reviewed full-session comparison promote that profile to DIFFERENTIAL. M2-02 cold-builds a separate immutable PageIndex by opening only the strict Catalog and root Pages dictionary. The root direct Kids and nonnegative Count are retained as explicit DeclaredCount evidence; bounded lookup classifies only direct children along the requested range, upgrades exact local contribution sums to ValidatedPartition, and upgrades to CompleteSubtree only after every descendant leaf is proven. Published and transaction-local discovered-node tables retain exact Parent edges and enforce cycle-before-duplicate precedence across refinements, while zero-count Pages, global node/depth/index-byte limits, source change, cancellation, terminal replay, out-of-range indices, and foreign handles remain structured. Successful lookups return a refined immutable index plus a PageHandle bound to the zero-based index, exact Page object, source snapshot, Catalog, revision, and current root Count evidence. M2-03 consumes that exact handle and the validated leaf-to-root chain to select the nearest non-null MediaBox, CropBox, Rotate, and Resources definition through strict or locally repaired proof owners. MediaBox is required, absent CropBox defaults to MediaBox, absent Rotate defaults to zero, Resources is required and names one scope rather than merging ancestor dictionaries, and direct or whole-value indirect definitions retain exact defining offsets and complete alias provenance. Box coordinates use exact signed nine-decimal fixed point, rotation accepts only integer multiples of ninety degrees, and independent ancestor, object, alias-edge, read, parse, and retained-state budgets fail before partial publication. M2-05 consumes that exact materialized Page and revalidated handle to acquire a unique Contents value through strict attested authority. Absence, null, and empty arrays publish empty content; supported whole-object aliases terminate in null, one stream, or one direct reference array, whose stream entries are opened and retained in execution order. Exact stream/filter evidence and independent structure, object-work, payload, decode-fuel, retained-state, cancellation, and source-integrity checks precede atomic publication. Unopened subtree Counts remain deliberately provisional; callers needing whole-tree recomputation use the unchanged M1 service. Locally repaired and acquired-chain page indexing/materialization/content acquisition, nested component references, general aliases, content execution, and broad ISO conformance remain outside this partial claim. The accepted M1 page-tree implementation and tests remain byte-for-byte unchanged. PDFium page-count probes remain unregistered, non-gating O4 observations."

[[requirement]]
id = "ISO-32000-1:2008/7.8.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Page content is an ordered stream sequence of PDF objects and operators, with array elements interpreted in order as one logical content sequence."
features = ["core.page-content-acquisition", "core.content-operator-scanner", "core.content-vm-scene-v1"]
implementation = ["core/document", "core/content"]
tests = ["core/document::page_content", "core/document::repository_policy", "core/content::scanner", "core/content::vm", "core/content::repository_policy"]
status = "partial"
notes = "The m2.page-content-acquisition.v1 profile reopens one exact Page through a strict attested proof, resolves only bounded whole-object Contents aliases, retains array-selected indirect streams in execution order, requests each exact encoded payload, canonicalizes its foundational filter plan, and retains either the sealed DecodedStream or an explicit zero-length unfiltered identity proof. The separate pure m2.content-operator-scanner.v1 profile accepts only that already-decoded ordered stream shape, treats stream boundaries as semantic whitespace, owns bounded null/boolean/number/name/string/array/dictionary operands, preserves exact decoded coordinates and page-global operator ordinals, recognizes the initial q/Q/cm/BT/ET/BX/EX/MP/DP/BMC/BDC/EMC table, and keeps lexically valid unknown operators distinct from malformed content. The sealed m2.content-vm-scene-v1 profile consumes only the resulting proof-bearing AcquiredPageContent, derives the scanner inputs internally, validates known operand shapes before state or unsupported policy, executes the bounded initial state operators, and atomically publishes an immutable Scene-bound interpreted Page. Independent scanner, VM, page-property, and Scene budgets remain owned by their layers; source change and cancellation are checked throughout; terminal Ready, Unsupported, and Failed outcomes replay without more work; and scanner, document, and Scene failures retain their original structured diagnostic types. Acquisition still excludes locally repaired or acquired revision-chain authorities, nested array aliases, indirect array elements that alias another object, and zero-length filtered streams. Inline images, Forms, paths, painting, text showing, fonts, images, and broad content compatibility remain outside this partial mapping."

[[requirement]]
id = "ISO-32000-1:2008/7.8.3"
