[[requirement]]
id = "ISO-32000-1:2008/7.9.2.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Human-readable PDF text strings select PDFDocEncoding unless an FE FF byte-order marker selects UTF-16BE, including supplementary Unicode characters."
features = ["core.pdf-text-string", "core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.pdf-text-string.v1 bootstrap consumes an already lexical-decoded PdfString. A leading FE FF selects UTF-16BE; every other prefix selects PDFDocEncoding. UTF-16BE payloads require even byte length and exact surrogate pairing, including supplementary scalars. A two-pass decoder measures logical UTF-8 length before fallible reservation, bounds both input and logical/allocator-retained UTF-8 bytes, checks cancellation after at most 256 input code units, and redacts content from diagnostics. It preserves but does not interpret Unicode language escape sequences, performs no normalization, and does not implement the PDF 2.0 UTF-8 extension. This mapping is partial and does not claim a complete outline, metadata, accessibility, or conformance service."

[[requirement]]
id = "ISO-32000-1:2008/D.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "PDFDocEncoding assigns defined single-byte codes to Unicode scalars and identifies undefined code points."
features = ["core.pdf-text-string", "core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::text_string", "core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The PDFDocEncoding mapping is manually transcribed from the hash-pinned normative Table D.2 rather than from an external implementation. Tests cover every non-identity assignment, defined TAB/LF/CR controls, bytes marked undefined in the table, identity ASCII and Latin ranges through boundary inputs, exact resource limits, and redacted failures. Undefined codes are rejected instead of substituted. This is a text-string decoding primitive, not font encoding, content extraction, or an ISO conformance claim."

[[requirement]]
id = "ISO-32000-1:2008/7.3.9"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "A null dictionary value is equivalent to an omitted entry, including an indirect reference that resolves to no object."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap treats direct null values as omitted for optional Catalog and outline fields before applying pair, link, count, and target rules. Its strict attested lookup does not yet implement the broader rule that an undefined indirect reference or an indirect reference resolving to null is equivalent to null. Instead, depending on field position, those cases remain lookup failures, strict root/item dictionary shape failures, or direct-only semantic-value failures. This entry records that compatibility boundary and does not claim general dictionary or object-resolution conformance."

[[requirement]]
id = "ISO-32000-1:2008/7.3.10"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Unless a rule requires otherwise, an object value may be direct or reached through an indirect reference with equivalent semantics."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap follows the Catalog Outlines reference and the structural First, Last, Parent, Prev, and Next references that their tables require to be indirect. It accepts direct outline-root Type and direct Title, Count, Dest, and A values only. An indirect form of any of those semantic fields returns UnsupportedOutlineRepresentation before dereferencing, so the bootstrap records that the form is permitted by 7.3.10 but deliberately makes no claim that the referenced target has the required type or value. Whole-object aliases and a general nested semantic resolver remain unsupported."

[[requirement]]
id = "ISO-32000-1:2008/7.7.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "A Catalog may identify the document outline root through an optional indirect Outlines reference."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::repository_policy"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap lazily interprets a unique non-null Catalog Outlines field only when outline enumeration is requested. A missing or null field returns an empty outline; a present value must be an exact indirect reference reopened through the attested revision. Page counting deliberately does not inspect this optional service field. Catalog aliases, revision chains, repair, and a persistent Catalog cache remain unsupported, so this entry is partial."

[[requirement]]
id = "ISO-32000-1:2008/12.3.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "Document outlines form parent-owned linked lists with text titles and recursively defined signed visible-item counts."
features = ["core.strict-outline"]
implementation = ["core/document"]
tests = ["core/document::outline", "core/document::outline_limit_config", "core/document::repository_policy", "tools/baseline::pdfium_outline_real_adapter", "tools/baseline::repository_pdfium_outline_probe"]
status = "partial"
notes = "The m1.strict-outline.v1 bootstrap reopens every root and item dictionary through one proof-preserving attested index, validates paired First and Last boundaries, exact Parent and Prev links, initial Prev and terminal Next shape, global uniqueness and cycles, and recomputes signed item and nonnegative root Count values without trusting them for allocation or traversal. A nonempty root requires Count equal to all visible items, including closed top-level items themselves but excluding their hidden descendants; an empty root requires Count omission. It emits a bounded owned preorder with decoded direct text-string titles and direct Dest-or-A target kind but never executes an action. Limits cover items, depth, siblings, child object work, title input and UTF-8 capacity, and allocator-reported result/traversal storage; title output is measured before aggregate allocation checks, cancellation is cooperative, and diagnostics are content-redacted. Section 7.3.10 permits indirect outline-root Type and indirect Title, Count, Dest, and A forms, but this bootstrap returns UnsupportedOutlineRepresentation before dereferencing and therefore does not judge the referenced target valid. A pinned, non-gating O4 PDFium public-bookmark comparison matches Native exactly for a valid three-item fixture over preorder depth, normalized title, signed item Count, and target kind; a wrong-Prev fixture yields Native RPE-DOCUMENT-0041 while PDFium still produces the outline, an expected difference because its public API does not expose Prev. Root Count, Last, Parent, Prev, raw target shape, and invalid-empty distinctions remain outside that external observable surface. Styles, destination resolution, action interpretation, indirect-null equivalence, revision chains, repair, registered fuzzing, contained baseline registration, and broad corpus differential evidence remain open; this mapping does not claim ISO conformance or M1 exit."

[[requirement]]
id = "RPE-ARCH-001/5.1-5.2"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native byte access binds immutable source snapshots and pauses on bounded missing ranges without platform I/O."
features = ["core.snapshot-byte-source", "runtime.range-resume-arbiter", "runtime.strict-base-open-job-owner", "runtime.strict-base-open-coordinator", "quality.native-range-resume-loop", "quality.native-strict-open-runtime-loop"]
implementation = ["core/bytes", "runtime/session", "tools/quality"]
tests = ["core/bytes::range_store", "core/bytes::repository_policy", "runtime/session::range_resume", "runtime/session::strict_base_open_owner", "runtime/session::strict_base_open_coordinator", "runtime/session::repository_policy", "tools/quality::native_range_resume_loop", "tools/quality::native_strict_open_runtime_loop"]
status = "partial"
notes = "The m1.range-store.v1 bootstrap provides checked ranges, source-bound stable slices, complete response metadata validation, metadata-only and response-bound EOF discovery, one-time unknown-length binding, allocator-capacity-aware shared backing, canonical missing ranges, resumable ticket subscriptions, partial-supply deduplication, source-change poisoning, and structured resource limits without filesystem, network, async-runtime, unsafe, third-party, or external-engine dependencies. Every DataTicket carries a private RangeStore namespace, so a same-number ticket from another store is rejected. The m1.range-resume-arbiter.v1 runtime slice privately owns one such store; the runtime caller registers each returned Pending ticket with its job, checkpoint, and generation, and a unified ordered completion stream yields either an arbiter-bound move-only resume permit or an exact ticket-local source-failure permit. Host supply, snapshot observation, and ticket failure only mutate Range state and may queue completion; they never invoke parser code inline. Cancellation preserves shared waiters, while close, source change, and invariant failure drop the store and precharged registration metadata into stable zero-current-resource terminals. The m1.strict-base-open-job-owner.v1 slice privately owns one strict-open job and consumes only identity-matching resume or failure permits; stale or mismatched permits are consumed without parser work. The m1.strict-base-open-coordinator.v1 synchronous component privately composes exactly one Range arbiter and one strict-open owner. Its public run_one method is the only parser entry, closes each poll-to-Pending registration and completion-to-permit-consumption sequence inside one exclusive actor turn, and leaves every host ingress as queue-only work. A queued host failure becomes SourceUnavailable without polling the parser or probing cancellation. Ready publishes one opaque move-only handoff containing the AttestedRevisionIndex and the same private source owner, so cached bytes remain owned until the handoff is transferred or its consuming close returns retained-owner release evidence. Component tests cover foreign, duplicate, late, cancellation, source-change, close, and terminal-precedence cases; the generated 612-byte quality path covers the exact five checkpoints, upper-half-before-lower out-of-order delivery, non-inline ingress, failure without a parser poll, and exact source-owner release evidence. Platform Range transport and acquisition, cross-request host coalescing, a generic multi-job scheduler with priority, fairness, backpressure, and generation registry, complete Session/request/Worker ownership, viewport generations, broader lifecycle model tests, allocator metadata beyond explicitly reported backing/capacity, registered fuzz campaigns, and browser/desktop E2E remain open; all features stay PLANNED and this entry does not claim M1 exit or Native rendering/differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.3"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native syntax parsing preserves source locations and raw lexical distinctions while enforcing bounded work."
features = ["core.pdf-syntax", "core.indirect-object-framing", "core.staged-stream-length-framing", "core.revision-aware-object-resolver", "core.attested-resident-footprint"]
implementation = ["core/syntax", "core/object", "core/document"]
tests = ["core/syntax::parser_behavior", "core/syntax::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::staged_length", "core/object::repository_policy", "core/document::revision_resolver", "core/document::repository_policy", "tools/quality::native_object_loop"]
status = "partial"
notes = "The m1.syntax-core.v1 bootstrap strictly parses bounded contiguous windows for PDF headers and direct null, boolean, number, name, string, array, dictionary, indirect-reference, borrowed keyword, and strict stream-line-boundary syntax; it retains source-bound spans and raw real notation, reports incomplete windows as control flow, applies deterministic lexical and owned-memory limits, and checks cancellation at fixed loop intervals. It also reports allocator-visible array and dictionary backing capacity separately from decoded scalar bytes. The m1.indirect-object-framing.v1 compatibility job composes those primitives into an exact header-validated indirect object and directly sized stream whose payload remains unread; successful envelopes carry the checked scalar-plus-container syntax heap capacity as a non-cumulative gauge and indirect Length remains a stable Unsupported result on that API. The sibling m1.staged-stream-length.v1 path stops after a validated stream dictionary and payload start, preserves a direct value or indirect reference plus source span, binds resolver-supplied integer metadata to the same-snapshot exact reference, and resumes bounded terminal framing at the exact checked payload end without fetching the complete payload. It does not itself resolve or attest the referenced integer. The m1.attested-resident-footprint.v1 profile propagates successful value-owned evidence toward proof-bearing document results, but it neither measures allocator metadata or RSS nor reserves cache space. The m1.revision-aware-uncompressed-resolver.v1 document slice now resolves effective uncompressed objects and uncompressed direct-integer stream Length dependencies from an already-composed chain. Compressed objects, aliased Length values, top-level placement attestation for updates, repair profiles, registered fuzzing, and service integration remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, or Native differential maturity."

[[requirement]]
id = "RPE-ARCH-001/5.4"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native xref primitives validate traditional tables, decoded unfiltered xref-stream tables, and bounded already-parsed revision candidates; product opening still attests only the traditional base profile."
features = ["core.traditional-xref", "core.decoded-xref-stream-table", "core.xref-revision-chain", "core.indirect-object-framing", "core.staged-stream-length-framing", "core.revision-aware-object-resolver", "core.base-revision-candidate-index", "core.strict-base-revision-attestation", "core.strict-base-open", "core.attested-object-access", "core.attested-reference-chain-resolution", "core.attested-resident-footprint", "runtime.strict-base-open-job-owner", "runtime.strict-base-open-coordinator", "quality.native-range-resume-loop", "quality.native-strict-open-runtime-loop"]
implementation = ["core/xref", "core/object", "core/document", "runtime/session", "tools/quality"]
tests = ["core/xref::traditional_xref", "core/xref::xref_stream", "core/xref::revision_chain", "core/xref::limit_config", "core/xref::source_error_policy", "core/xref::repository_policy", "core/object::object_behavior", "core/object::framing_matrix", "core/object::staged_length", "core/object::limit_config", "core/object::source_error_policy", "core/object::repository_policy", "core/document::revision_resolver", "core/document::revision_index", "core/document::revision_attestation", "core/document::revision_attestation_limit_config", "core/document::strict_base_open", "core/document::attested_object_access", "core/document::reference_chain_resolution", "core/document::reference_chain_limit_config", "core/document::limit_config", "core/document::repository_policy", "runtime/session::strict_base_open_owner", "runtime/session::strict_base_open_coordinator", "runtime/session::repository_policy", "tools/quality::native_object_loop", "tools/quality::native_range_resume_loop", "tools/quality::native_strict_open_runtime_loop"]
status = "partial"
notes = "The m1.traditional-xref.v1 bootstrap is limited to a known-length immutable source, bounded reverse discovery of the final line-delimited startxref marker, and strict resumable parsing of one complete traditional base xref table and trailer with checked geometry and a retained full snapshot. The separate m1.decoded-xref-stream-table.v1 primitive validates one caller-supplied complete unfiltered payload against source-bound dictionary metadata, including unique Type/Size/W/Index/Root/Prev fields, exact row geometry, free/uncompressed/compressed row semantics, deterministic decoded-byte/entry/index/capacity limits, cooperative cancellation, and stable recovery policy. It deliberately represents row coordinates as relative decoded spans rather than physical source ByteSpan values. It does not acquire or frame the containing indirect object, validate Length, decode filters, resume over missing bytes, follow Prev, merge a hybrid XRefStm supplement, or publish revision precedence. The sibling m1.indirect-object-framing.v1 job accepts untrusted xref-derived geometry, requires a preceding PDF whitespace byte plus the exact number/generation/obj header, and frames a direct value or directly sized stream without crossing its independently supplied physical upper bound. The m1.staged-stream-length.v1 path can instead stop at the stream payload start, expose a direct or indirect Length declaration, bind later resolver-supplied integer metadata to the same snapshot and reference, and resume exact boundary framing without reading the opaque payload in full; it does not resolve or attest that referenced integer itself. The m1.strict-base-revision-index.v1 product composition bootstrap sorts one traditional base section's in-use offsets into checked, non-overlapping candidate physical intervals; those intervals remain untrusted until consumed by the m1.strict-base-revision-attestation.v1 job. That strict job validates one supported header at source offset zero and linearly covers the complete header-to-startxref object area: it frames every in-use candidate in physical order, accepts only PDF whitespace and line-terminated comments in the prefix and inter-object gaps, and publishes fixed-size object evidence only after every frame and gap succeeds. The m1.strict-base-open.v1 job is the product entry that composes xref discovery, candidate construction, and attestation under one JobId and five distinct checkpoints. It preserves complete lower xref or document errors and cumulative phase accounting, propagates Pending without double charging, and publishes only the sealed `AttestedRevisionIndex`; neither the xref section nor candidate index crosses the entry boundary. The m1.strict-base-open-job-owner.v1 runtime slice exclusively retains one such job and its fixed generation. Resume execution and source-failure disposition require exact arbiter, ticket, job, checkpoint, and generation identity; stale or foreign permits are consumed without polling. The m1.strict-base-open-coordinator.v1 component privately composes that owner with one Range arbiter, makes public run_one the only parser entry, registers Pending before returning it, and consumes each queued resume or failure completion in the same exclusive actor turn that updates the owner. Host ingress never polls. Ready crosses the boundary only as an opaque move-only handoff containing the attested index and the same private source owner; consuming close returns retained-owner release evidence. Component and generated-PDF quality tests cover all five checkpoints. The component suites cover reverse physical delivery, cancellation in both child layers, source mismatch precedence, terminal replay, foreign and same-number tickets, stale and mismatched permit rejection, failure completion without parser or cancellation polling, and cancel/source-change/close release; the generated quality loops cover upper-half-before-lower delivery, owner-mediated generation validation, atomic actor-turn coordination, and successful Ready handoff. The m1.attested-object-access.v1 capability lets only that attested index mint bounded one-shot reopen jobs under the retained object/syntax profile and an explicit caller-lent work cap; a successful job reproduces its fixed evidence before exposing a borrowed semantic value through an attested wrapper, never a raw target, lower job, or unwrapped object. The m1.attested-reference-chain.v1 job follows only a top-level direct indirect-reference value, detects exact-reference cycles with the full closing chain, drops intermediate parsed objects, and applies job-wide object, edge, depth, path-capacity, read, and parse limits. It treats dictionaries, arrays, streams, and every other direct value as terminal and is not a complete object-graph resolver. The m1.attested-resident-footprint.v1 profile exposes checked value-owned footprints for reopened and resolved values; each includes its runtime inline Rust representation and retained syntax capacity, and the figures remain cache-admission evidence only: they exclude allocator metadata, source and byte-cache storage, stream payloads, an outer cache container, and ownership or eviction decisions. The separate m1.session-ready-store.v1 runtime primitive consumes that evidence, and the isolated m1.ready-session-owner.v1 slice owns and drops one such store without changing core/document ownership. The separate m1.revision-aware-uncompressed-resolver.v1 slice derives bounded anchors from an already-composed chain, preserves latest-wins free, unknown-type null, and generation states without fallback, frames effective uncompressed objects, and resolves an indirect Length only through an effective uncompressed direct nonnegative integer. It forwards sparse Range checkpoints and has cancellation and source-change terminal coverage, but does not linearly attest top-level placement. Filtered xref-stream acquisition and decode, Prev and hybrid acquisition from source, object streams, repair, unknown-length sources, nested semantic graph traversal, persistent Ready caching and cross-session reuse, in-flight concurrent resolution coalescing, a generic multi-job scheduler and complete Session lifecycle, viewport generations, parent budget hierarchy, cross-job/session aggregate work, registered fuzzing, and broader document services remain open. This project-architecture mapping does not claim M1 exit, ISO clause coverage, R0 conformance, a complete resolver, or Native/PDFium semantic or pixel differential maturity."

component_notes = "The m1.xref-revision-chain.v1 pure composer consumes already-parsed candidates newest-to-oldest and validates one immutable snapshot, exact backward primary Prev links, nondecreasing Size, complete traditional base versus sparse updates, primary-stream self anchors, hybrid Prev < XRefStm < current geometry, unique anchors, stable limits, and cancellation. Lookup order is current traditional primary, current hybrid supplement, then the older primary; primary free and xref-stream unknown-type null rows hide older definitions. The newest root must resolve to a live generation-compatible entry and cannot become visible only through its same-revision hidden supplement. Supplemental Prev metadata is retained but never drives the primary chain. The m1.staged-stream-length.v1 object component exposes a bounded Range-resumable stream envelope and exact-boundary job for direct or resolver-supplied same-snapshot Length claims; its legacy one-shot API remains direct-only. The m1.revision-aware-uncompressed-resolver.v1 document slice now connects those two components for already-composed chains: it derives bounded cross-revision physical anchors, preserves latest-wins free/null/generation terminal states without fallback, frames effective uncompressed objects, and resolves an indirect `/Length` only through an effective uncompressed direct nonnegative integer with sparse Range, cancellation, and source-change coverage. Its xref-derived intervals plus local header checks do not linearly attest top-level object placement. The traditional parser still rejects sparse incremental tables and XRefStm; Prev chains and stream filters are not acquired from source, and compressed-object resolution, repair, strict-open integration, document-service integration, and complete resolver ownership remain open. All three component profiles remain PLANNED and this mapping does not claim M1 exit."

[[requirement]]
id = "RPE-ARCH-001/5.8-5.9"
snapshot_hash = "sha256:53d46023770b4558705cc00f779fb3031245d473378d82869875283913157541"
summary = "Native strict-base document composition provides bounded text strings, outline enumeration, and complete Page/Pages validation, including PageTreeCountMismatch for inconsistent Count values."
features = ["core.pdf-text-string", "core.strict-outline", "core.strict-page-count"]
implementation = ["core/document"]
