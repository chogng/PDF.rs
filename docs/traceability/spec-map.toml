status = "partial"
notes = "The m2.inherited-page-values.v1 profile retains the nearest non-null proof-bearing Resources dictionary selected along the exact validated Page-to-root chain without merging ancestors. The no-I/O m2.page-property-lookup.v1 resolver borrows that retained dictionary, checks the bound SourceSnapshot and cancellation without polling for bytes, requires one direct /Properties dictionary and one uniquely selected indirect-reference value, and returns fixed-size PagePropertyReference evidence with the defining Page or Pages object, physical dictionary owner, exact key/value offsets, revision, and target ObjectRef. Independent cumulative lookup and dictionary-entry-visit budgets are charged before publication, and the requested property name is not copied into the proof. Missing, duplicate, or ill-typed structures remain exact document failures; an indirect /Properties dictionary and a directly embedded selected property dictionary are structured unsupported outcomes. The resolver never opens or attests the selected target object. The Content VM preserves ordinary document failures unchanged and maps only those two document unsupported shapes to content-layer Unsupported values that retain the original lower DocumentError. Other resource categories, ancestor merging, nested component aliases, target-object interpretation, and general resource conformance remain outside this partial mapping."

[[requirement]]
id = "ISO-32000-1:2008/8.4.2"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "The graphics-state stack is saved by q and restored by Q with properly nested and balanced use."
features = ["core.content-vm-scene-v1"]
implementation = ["core/content"]
tests = ["core/content::vm", "core/content::repository_policy"]
status = "partial"
notes = "The sealed initial VM validates q and Q as zero-operand operators, retains only the current transformation matrix in each saved graphics-state entry, enforces an independent graphics-depth budget, and reports stable underflow or terminal imbalance without publishing a partial Scene. Operator count, deterministic fuel, allocation, and retained-state limits remain independent. Color, clipping, line, text, transparency, and every other graphics-state parameter are not saved by this bounded profile, so this is not a complete graphics-state implementation."

[[requirement]]
id = "ISO-32000-1:2008/8.4.3"
snapshot_hash = "sha256:9de0ca9e8570d6209e8bd48a355be8eb6ec376acfc3fc3ae97cd8730351417ff"
summary = "The cm operator concatenates a six-number matrix with the current transformation matrix."
features = ["core.content-vm-scene-v1"]
implementation = ["core/content", "core/scene"]
tests = ["core/content::vm", "core/content::repository_policy", "core/scene::scene_v1"]
status = "partial"
notes = "The initial VM requires exactly six numeric operands, converts them to exact signed nine-decimal fixed point, and computes current × operand in the Scene column-matrix representation, which is equivalent to PDF operand-prepend row semantics. The implementation pins this direction as current_ctm.checked_multiply(operand), and a non-commuting regression expects translation components 16 and 28. Invalid operand count or type, numeric precision or overflow, and Scene matrix overflow remain distinct structured failures with exact operator provenance. Tests cover model-equivalent composition and deterministic replay. The resulting CTM is retained on the interpreted Page but this profile does not yet apply it to paths, glyphs, images, Forms, clipping, or rendering."

[[requirement]]
id = "ISO-32000-1:2008/9.4"
