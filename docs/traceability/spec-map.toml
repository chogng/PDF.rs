status = "partial"
notes = "The m2.scene-v1.v1 foundation publishes one immutable bounded Scene v1 with exact nine-decimal fixed-point page geometry, source-bound page/revision metadata, ordered begin/end marked-content commands, first-command-use marked-content-property resource IDs, one-to-one decoded-coordinate command provenance, a bounded supported-tag feature report, and deterministic canonical JSON. Canonical bytes use fixed field order, scaled integers, lowercase hexadecimal names, semantic array order, checked output allocation, and omit runtime SourceIdentity noise. The independent m2.scene-semantic-diff.v1 profile compares schema, page binding except runtime source identity, geometry, feature decision/tags, resources, commands, and command provenance in fixed section order, publishing only fixed-size content-redacted records plus independently bounded canonical diff JSON. M2-06 supplies one bounded producer: m2.content-vm-scene-v1 consumes strict-attested acquired Page content, emits only marked-content begin/end commands and property resources, preserves exact command provenance, and publishes Scene only after balanced VM state and every lower-layer budget succeed. Unsupported and failed interpretations never own a partial Scene, while scanner, document, and Scene errors retain their original types. M2-07 now closes the bounded M2 exit gate with six registered normative Scene cases, two content-addressed canonical Scene goldens, two fresh in-process strict-pipeline executions per case, four fresh debug/release profile replays, three recursive byte comparisons, a canonical 1150-byte result record, and an independent SHIP review with no open P0-P2 findings. The gate's output writer requires an absent or empty dedicated directory and never recursively deletes caller-selected content. M3-01 adds one pure exhaustive Scene consumer without changing the Scene schema: m3.reference-pixel-foundation.v1 accepts an immutable Scene, explicitly treats the current begin/end marked-content commands as non-painting, retains the exact runtime page binding, and atomically publishes a complete value-only pixel buffer. A future visible Scene command cannot silently fall through to blank pixels because command matching has no wildcard arm. This foundation does not yet add paths, clips, general graphics or text commands, glyphs, images, Forms, broader resources, capability requirement graphs, spatial indexes, schema parsing/minor skipping, IPC, renderer adapters, or tools/compare integration. All component and quality feature records remain PLANNED; bounded work-item or milestone completion is not a maturity promotion."

