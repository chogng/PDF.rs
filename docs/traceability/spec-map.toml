notes = "The m1.range-resume-arbiter.v1 slice owns namespaced snapshot-bound Range tickets, exact job/checkpoint/generation registrations, an ordered stream of arbiter-bound move-only resume or failure permits, cached source backing, and precharged registration capacity. Its close drops all of them before returning one idempotent release report; source-change and invariant-failure terminals likewise expose zero current resources and never become active again. Exact cancellation removes a pending or queued generation, releases an abandoned last-subscriber ticket, and preserves shared waiters. Data arrival only queues a permit; it does not run parser code. The m1.strict-base-open-job-owner.v1 slice owns one queued or waiting strict-open job and validates every resume or failure permit's issuer, ticket, job, checkpoint, and generation before changing the job. Late or mismatched permits are consumed without parser work. The m1.strict-base-open-coordinator.v1 component privately owns exactly one such owner and one Range arbiter. Public run_one is its only parser entry: a poll and Pending registration complete in one exclusive actor turn, and a queued completion is taken and consumed in another. Host supply, snapshot observation, and failure ingress never poll parser code; accepted bytes or ticket failure may queue work, while integrity mismatch tears down synchronously, and a failure turn does not poll the parser or probe cancellation. Cancellation and source change synchronously release both lower owners into stable zero-current-resource terminals. The first coordinator close saves the job-owner report and, when the source has not been handed off, its source-owner report; repeated close returns the same report. Closing the empty ReadyHandedOff shell does not reclaim the independent handoff source. Ready transfers the attested index and same private source owner through one opaque move-only handoff, leaving the coordinator itself at zero resources while the handoff owns cached bytes until it is transferred or consuming close returns retained-owner release evidence. The m1.ready-session-owner.v1 slice separately retains an already-issued opaque session identity, owns exactly one session-only Ready store, checks Closed before cancellation or cache semantics, returns stable `SessionClosed`, preserves move-only successful values, and returns the same close report on every call. Its first close explicitly drops the complete Ready store before returning; a borrowed cache hit cannot coexist with mutable close. The quality loops exercise the coordinated five-checkpoint handoff and host-failure zero-poll path, lower-owner stale-generation and close/source-change behavior, Ready-store admission, borrowed hit, synchronous close, exact released-resource evidence, zero post-terminal resources, and repeated idempotent close. This one-job strict-open coordinator and the separately isolated Ready owner are synchronous component actors, not one complete Session: a generic job queue and scheduler, Created/Opening/Waiting/Failed orchestration across multiple jobs, asynchronous Closing drain across every request and surface, event publication, session ID allocation and Worker-epoch non-reuse, viewport generations, queue shutdown, and close deadlines remain open. A future complete session must close every owner before publishing `SessionClosed`; this partial mapping does not claim the complete handle or Session lifecycle."

component_notes = "The bounded M1 actor now realizes the required Created/Opening/WaitingForData/Ready/Closing/Closed/Failed lifecycle for its fixed strict-document scope. Parser-free ingress, queued accepted data/ticket failure, synchronous exact cancellation and source-change teardown, ordered jobs-and-permits then cache then index then source release for explicit close/source-change, idempotent close, and zero terminal resources are executable. A Range-detected snapshot-integrity mismatch atomically poisons its lower source before the actor releases upper owners; that fail-closed exception claims zero terminal resources, not the explicit-path release order. Test-only loopback HTTP evidence drives strong If-Range requests through the same actor, observes a delayed response after cancellation, and closes a changed validator/revision without accepting old work. It deliberately does not claim a product HTTP adapter, a general SessionHandle registry, asynchronous drain protocol, viewport lifecycle, rendering surfaces, or Worker/IPC scheduler."

