schema = 1
captured_at = 2026-07-17
purpose = "M4-09 sandbox prerequisite capability audit; not release evidence"

[environment]
os = "macOS 26.4.1"
build = "25E253"
architecture = "arm64"
rustc = "1.93.0 (254b59607 2026-01-19)"

[signing]
command = "security find-identity -v -p codesigning"
valid_identities = 0
ad_hoc_app_sandbox_probe = "terminated with SIGABRT before probe execution"
conclusion = "This workspace cannot create trusted parent/helper App Sandbox enforcement evidence."

[selection]
record = "platform/desktop/macos/sandbox-target.toml"
host_entitlements = "platform/desktop/macos/host.entitlements"
worker_entitlements = "platform/desktop/macos/worker.entitlements"
product_gate = "IsolationUnavailable"
m4_09 = "in_progress"

[fd_hygiene]
captured_at = 2026-07-18
wrapper = "platform/macos-spawn"
desktop_unsafe = false
darwin_default_close = true
explicit_child_fds = "fd0 authenticated duplex worker socket; fd1/fd2 /dev/null"
fixed_argv = "absolute executable, --pdf-rs-desktop-child"
environment = "validated absolute TMPDIR only when present"
signal_state = "spawn attributes plus the worker's first safe entry hook restore SIGPIPE default and an empty mask after Rust startup"
real_probe = "platform/macos-spawn/tests/darwin_spawn.rs"
probe_scope = "non-CLOEXEC fd 200/201 rejection plus exact child FD enumeration, fd0 duplex, /dev/null stdio, exact argv/TMPDIR propagation, challenged SIGPIPE default and empty mask, exit/wait/signal mapping, invalid paths/TMPDIR, and successful/failed-spawn FD stability"
owner_cleanup = "post-spawn cleanup and final Host/Supervisor Drop abort instead of discarding an owned child when reap cannot be proven, including a real-Child subprocess SIGABRT probe; launch identities are consumed before each attempt"
security_claim = "FD hygiene only; not App Sandbox enforcement or denial evidence"

[product_feature_closure]
captured_at = 2026-07-18
scope = "unsigned host-native release worker package prerequisite"
fresh_external_target = true
release_profile = true
default_features_enabled = false
enabled_fingerprint_features = "[]"
declared_fingerprint_features = ["default", "transport-fixture"]
desktop_feature_fingerprints = 2
desktop_fingerprint_directories = 2
single_library_fingerprint = true
single_worker_fingerprint = true
fingerprint_directory_association_exact = true
dependency_graph_exact = true
rustflags_empty = true
native_compile_kind = true
product_feature_marker_observed = "no_default_features_v1"
fixture_feature_marker_absent = "transport_fixture_v1"
cargo_filename_suffix_associated = true
matching_worker_sha256_observed = true
observed_worker_sha256 = "d24fe695849fe306ac4fb923e65cbede4f2d0cf757f61acc41358cdd0a5bafaf"
fixture_launch_api_product_visible = false
mutation_tests = ["default feature drift", "enabled and declared feature drift", "dependency, rustflags, and profile drift", "duplicate and orphan fingerprint directories", "Cargo filename hash suffix drift", "top-level worker substitution", "paired fixture-marker worker substitution"]
worker_content_provenance_proved = false
product_package_produced = false
universal_binary_proof = false
signed_package_proof = false
evidence_boundary = "The marker, Cargo filename association, and matching SHA-256 describe one ephemeral host-native release invocation. A crafted paired executable containing the product marker is not excluded without signed package provenance; this is neither an app/package hash nor codesign, entitlement, universal-slice, notarization, or App Sandbox evidence."

[signed_universal_package_verifier]
captured_at = 2026-07-18
scope = "verification capability; not release evidence"
cli = "pdf-rs-quality verify-macos-package ROOT PDF.rs.app"
approval_record = "platform/desktop/macos/package-approval.toml"
approval_record_present = false
approval_scope = "external_release_trust_anchor"
exact_bundle_layout = "PDF.rs.app with four directories, four regular files, and exactly two Mach-O executables"
fixed_host = "Contents/MacOS/PDF.rs; identifier rs.pdf.desktop"
fixed_worker = "Contents/Helpers/pdf-rs-desktop-worker; identifier rs.pdf.desktop.worker"
fixed_architectures = ["arm64", "x86_64"]
system_inspections = 18
codesign_verification = "deep Host bundle plus direct Host/helper strict verification, all architectures"
per_slice_observation = "Host/helper signing metadata, ordered nonempty authority chain, exact entitlements, and exact dynamic dependency closure for arm64 and x86_64"
external_anchors = ["feature-free Worker SHA-256", "canonical complete package-tree SHA-256", "TeamIdentifier", "app and build versions"]
topology_rejections = ["symlink", "hardlink", "special file", "unknown file", "unknown executable", "special permission bits", "surplus directory", "forbidden PDF engine content"]
bounded_execution = "fixed absolute system tools, exactly 18 invocations, 15 seconds and 1 MiB per output stream per invocation"
snapshot_recheck = true
mutation_tests = ["missing approval", "paired Worker/package substitution against unchanged anchors", "missing feature-free marker", "fixture marker", "forbidden external PDF engine content", "package change during inspection", "authority order and slice drift", "entitlement widening", "architecture drift", "external dependency", "command failure", "timeout", "output overflow", "symlink", "hardlink", "unknown executable", "special mode", "global package entry overflow"]
content_provenance_proved = false
universal_binary_proof = false
signed_package_proof = false
app_sandbox_enforcement_proof = false
evidence_boundary = "The repository can validate externally supplied release evidence but cannot manufacture its trust anchors. No approval record or signed package is checked in, so successful release verification has not occurred."

[open_gates]
items = [
  "signed parent app and embedded helper packaging",
  "external package approval record and an actual signed universal package passing exact codesign, entitlement, dependency, architecture, Worker-hash, and package-hash verification",
  "live child filesystem and network denial probes",
  "live inherited authenticated socket and read-only shared-memory success probes",
  "recorded sandbox Surface backend, inherited parent-app TMPDIR fallback, read-only reopen, unlink-before-SCM_RIGHTS, and zero residual objects without app-group widening",
]
