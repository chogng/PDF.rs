name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr:
    name: PR quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pinned Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: platform/browser/package-lock.json
      - name: Install locked fuzz toolchain
        run: |
          cargo install --locked --version 0.13.2 cargo-fuzz
          actual="$(cargo fuzz --version)"
          if [ "$actual" != "cargo-fuzz 0.13.2" ]; then
            echo "expected cargo-fuzz 0.13.2, got $actual" >&2
            exit 1
          fi
      - name: Install browser Wasm target
        run: rustup target add --toolchain 1.93.0 wasm32-unknown-unknown
      - name: Run browser contract baseline
        working-directory: platform/browser
        run: |
          npm ci
          npm run check
      - name: Run repository CI
        run: ./scripts/ci.sh pr
