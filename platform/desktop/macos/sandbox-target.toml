schema = 1
id = "m4.macos-app-sandbox-inherited-worker.v1"
selected = true
status = "prerequisite_only"
release_eligible = false
m4_09_status = "in_progress"
m4_10_status = "planned"

[target]
os = "macos"
architectures = ["arm64", "x86_64"]
ui = "AppKit host with NSOpenPanel PowerBox acquisition"
ipc = "launch-private Unix socketpair plus authenticated fixed_le_v1 records and SCM_RIGHTS"
sandbox = "signed macOS App Sandbox host with directly spawned inherited helper"
surface = "unlinked read-only POSIX shared memory or sandbox-container private-file fallback"

[entitlements]
host = "platform/desktop/macos/host.entitlements"
worker = "platform/desktop/macos/worker.entitlements"
host_exact = [
  "com.apple.security.app-sandbox",
  "com.apple.security.files.user-selected.read-only",
]
worker_exact = [
  "com.apple.security.app-sandbox",
  "com.apple.security.inherit",
]
network = "none"
broad_filesystem = "none"
temporary_exceptions = "none"
app_groups = "none"

[isolation_contract]
source_owner = "host"
source_delivery = "exact immutable authenticated Range bytes through read-only transferred handles"
source_path_to_worker = false
source_file_descriptor_to_worker = false
powerbox_extension_to_worker = false
worker_network_entitlement = false
worker_arbitrary_filesystem_entitlement = false
worker_filesystem = "inherited parent-app container and sandbox-provided temporary storage only; no arbitrary external paths"
worker_ipc = "only the inherited authenticated socket and validated transferred read-only handles"

[surface_probe]
backend_must_be_recorded = true
sandbox_tmpdir_fallback_required_when_posix_shm_is_denied = true
read_only_reopen_required = true
unlink_before_scm_rights_required = true
receiver_extent_and_rights_validation_required = true
worker_exit_zero_residual_objects_required = true
app_group_shm_exception_allowed = false

[spawn_fd_contract]
current = "the gated product path uses the repository-owned Darwin default-close wrapper; the feature-only transport fixture retains crate-local CLOEXEC plus spawn serialization"
required = "Darwin POSIX_SPAWN_CLOEXEC_DEFAULT with explicit stdin/stdout file actions through a separately reviewed repository-owned unsafe wrapper, plus a real inherited-FD allowlist probe"
implemented = true
wrapper_crate = "platform/macos-spawn"
wrapper_api = "spawn_desktop_worker"
argv = "absolute program path plus --pdf-rs-desktop-child; no PATH search"
environment = "validated absolute TMPDIR only when present"
signal_state = "spawn attributes plus the worker's first safe entry hook restore SIGPIPE default and an empty signal mask after Rust startup"
child_fds = "worker socket fd 0; /dev/null fd 1 and fd 2; all action sources at or above fd 3 and explicitly closed"
child_lifecycle = "owned positive PID with cached ExitStatus; rustix try_wait, SIGKILL, and wait; no implicit wrapper Drop reap; desktop post-spawn cleanup and final Host/Supervisor Drop abort if reap cannot be proven"
real_probe = "platform/macos-spawn/tests/darwin_spawn.rs"
security_claim = "FD hygiene only; never an operating-system sandbox"
residual_risk = "macOS socketpair creation is not atomically CLOEXEC against a foreign concurrent fork before fcntl; the product host must own and serialize process creation"

[product_gate]
api = "DesktopChildSupervisor::start_product_macos"
current = "IsolationUnavailable before spawn"
transport_fixture_feature = "transport-fixture"
transport_fixture_feature_default = false
transport_fixture_feature_product_allowed = false
caller_attestation_accepted = false
environment_attestation_accepted = false
unsigned_binary_accepted = false
transport_fixture_is_product = false

[product_feature_closure]
closure_scope = "package_prerequisite"
prerequisite_complete = true
cargo_package = "pdf-rs-desktop"
cargo_binary = "pdf-rs-desktop-worker"
release_profile = true
default_features_enabled = false
forbidden_features = ["transport-fixture"]
required_fingerprint_features = "[]"
required_declared_features = ["default", "transport-fixture"]
fresh_external_target_required = true
required_desktop_fingerprint_directories = 2
single_library_fingerprint_required = true
single_worker_fingerprint_required = true
worker_feature_marker_required = "no_default_features_v1"
worker_fixture_marker_forbidden = "transport_fixture_v1"
worker_cargo_filename_association_required = true
matching_worker_sha256_observation_required = true
worker_content_provenance_proved = false
fixture_launch_api_product_visible = false
product_package_produced = false
universal_binary_proof = false
signed_package_proof = false

[required_closure]
items = [
  "signed parent .app with the exact host entitlement set",
  "embedded helper signed on copy with the exact worker entitlement set",
  "codesign verification of identifiers, hardened runtime, nested code, and exact entitlements",
  "real child denial probes for a host-readable PowerBox file and a live loopback network listener",
  "real child success probes for the inherited authenticated socket and read-only shared-memory transfer",
  "recorded sandbox Surface backend proving inherited parent-app TMPDIR fallback when POSIX shared memory is denied",
  "read-only reopen, unlink-before-SCM_RIGHTS, receiver validation, and zero residual shared objects after child exit",
  "no app-group or temporary-exception widening for /pdf-rs-* shared-memory names",
  "signed universal helper content provenance, bytes, and both architecture slices bound to the validated feature-free release worker SHA-256, including resistance to crafted paired substitution",
  "package and CI artifact hashes bound to the selected universal macOS target",
]

[prohibited]
mechanisms = [
  "sandbox-exec",
  "sandbox_init",
  "private Seatbelt APIs",
  "caller booleans, strings, environment variables, or self-authored evidence as isolation proof",
]

[references]
helper = "https://developer.apple.com/documentation/xcode/embedding-a-helper-tool-in-a-sandboxed-app"
inheritance = "https://developer.apple.com/library/archive/documentation/Miscellaneous/Reference/EntitlementKeyReference/Chapters/EnablingAppSandbox.html"
