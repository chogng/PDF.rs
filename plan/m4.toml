schema = 1
milestone = "M4"
title = "Fast CPU and desktop vertical slice"
status = "in_progress"
started_at = 2026-07-17
depends_on = ["M3"]
exit_gate = "R0-eligible basic pages reach CANARY and the desktop Native-only reading loop is usable."
max_parallel_work_items = 3

principles = [
  "Freeze the canonical Engine protocol and Surface schema before browser or desktop adapters implement transport-specific bindings.",
  "Keep CapabilityDecision and Native RenderPlan backend-neutral, versioned, bounded, and auditable before any expensive raster work starts.",
  "Treat the independently reviewed M3 Reference profile as the registered differential target for Fast CPU, never as an automatic specification oracle.",
  "Use complete source, revision, Scene, viewport, output, renderer, and policy identities for every product tile and cache lookup.",
  "Make viewport replacement, cancellation, backpressure, Surface release, session close, and Worker restart explicit deterministic state transitions.",
  "Publish only complete Native surfaces; unsupported, rejected, cancelled, stale, source-changed, and resource-limited work never becomes a partial display result.",
  "Keep PDFium and every other external PDF engine outside product dependencies, runtime recovery, IPC, desktop packaging, and user-visible pixels.",
  "Use a local-development Electron shell for the selected M4 reading target while keeping PDF parsing, Scene production, and raster work behind a reusable Rust interface.",
  "Retain the authenticated macOS native-worker and AppKit-facing interfaces as a future fully Rust UI path; signing and packaged App Sandbox evidence do not block the selected Electron development target.",
  "Interpret the three logical lanes as dependency and review limits; M4 and M5 may proceed in parallel only after M4-01 freezes their shared contract.",
]

registered_scope = [
  "A canonical protocol and generated Rust, TypeScript, and desktop-codec bindings for the bounded open, viewport, capability, Surface, release, close, and shutdown flow.",
  "A versioned Native RenderPlan and CapabilityDecision for the registered M3 Reference graphics subset and its Fast CPU implementation.",
  "Deterministic product-tile planning, complete cache keys, bounded admission and eviction, viewport priority, fairness, generation cancellation, and stale-result suppression.",
  "A Fast CPU tiled renderer whose registered outputs are differentially checked against reviewed Reference expectations and whose long loops cooperate with cancellation.",
  "Worker/session-owned immutable Surface metadata, shared-memory transfer, one-shot publication, idempotent release, lease reclaim, close invalidation, and epoch validation.",
  "A bounded desktop host and Native worker vertical slice that opens a local immutable source and completes scroll, zoom, rotation, stale-generation, and shutdown flows.",
  "CANARY evidence for the explicitly registered R0-eligible basic-page cohort, including rollback, support-rate, correctness, stability, and fixed-scope performance records.",
]

excluded_scope = [
  "GPU rendering, WebGPU, native shared textures, platform color management, system-font fallback, and graphics capabilities outside the registered M3 subset.",
  "Selection, copy, search, links, annotations, forms, saving, accessibility, advanced text, and the complete M6 release-r0-v1 experience.",
  "Persistent cross-user cache, distributed rendering, unbounded work stealing, speculative network access, and arbitrary filesystem access by the engine worker.",
  "Electron application packaging, notarization, signing, auto-update, and release distribution for the selected local-development target.",
  "DEFAULT or STABLE promotion, broad PDF compatibility, and any product fallback to an external PDF engine.",
]

