schema = 1
id = "r0-development-plan"
version = "0.3.0"
status = "active"
planning_basis = "RPE-ARCH-001 v0.3, sections 2.6 and 15.3"
last_updated = 2026-07-17
max_parallel_milestones = 2
max_parallel_work_items_per_milestone = 3

[capacity]
assumed_team_fte = 7.0
delivery_allocation = 0.80
assumed_delivery_fte = 5.6
review_and_interrupt_reserve_fte = 1.4

assumptions = [
  "Role labels are accountable workstreams, not assignments to named people.",
  "Planned FTE is average concurrent capacity for a milestone, not headcount or a hiring commitment.",
  "Dates are draft planning targets and move when an upstream exit gate is not satisfied.",
  "The seven-FTE planning model reserves twenty percent for review, incident response, maintenance, and unplanned conformance work.",
  "At most two milestones may be active at once; M5 is the only planned parallel milestone branch.",
  "An owner role may not be the sole reviewer of its own milestone exit gate.",
  "M5 may start only after the protocol and surface schema are frozen, and may not exit before M4 CapabilityDecision and Native RenderPlan contracts are accepted.",
  "M6 starts only after both the M4 desktop and M5 browser vertical-slice exit gates pass.",
]

[capacity.role_fte]
spec_conformance = 0.75
parser_security = 1.25
graphics_color = 1.50
font_text_a11y = 1.00
runtime_platform = 1.00
quality_corpus = 1.00
baseline_release = 0.50

[[milestone]]
id = "M0"
title = "Quality infrastructure"
owner_role = "quality-corpus"
reviewer_roles = ["spec-conformance", "baseline-release"]
planned_fte = 4.5
start_date = 2026-07-13
target_date = 2026-08-28
dependencies = []
max_parallel_work_items = 3
deliverables = [
  "case manifest and generators",
  "runner schema and parse/scene/text/pixel diff skeletons",
  "benchmark harness and corpus manager",
  "process-isolated external baseline runner",
]
exit_gate = "Synthetic parse, Scene, text, and pixel outputs produce a complete failure bundle; baseline and product build dependencies are isolated."
status = "complete"
completed_at = 2026-07-15
reviewed_by_roles = ["spec-conformance", "baseline-release"]
evidence = [
  "active independently reviewed O1 case: tests/cases/infrastructure/synthetic-failure-bundle-001/case.toml",
  "exact content-addressed parse/Scene/Text/Pixel bundle replay: cargo test -p pdf-rs-quality --test m0_exit and ./scripts/ci.sh pr",
  "protocol-v2 direct-child external runner contract: cargo test -p pdf-rs-baseline --test process_harness --test pdfium_adapter_contract",
  "fixed-input PDFium O4 observations: tools/baseline/pdfium/evidence/pdfium-c040cf96-macos-arm64-o4-pixel-adapter-probe-v1.toml",
  "fresh release product dependency closure: scripts/ci.sh prepare-product-build-proof and check-product-build-closure steps",
  "canonical corpus and benchmark replay: cargo run --quiet --package pdf-rs-corpus -- validate tests/corpus/manifests/t0-bootstrap-v1.toml . and cargo run --quiet --package pdf-rs-benchmark -- validate tests/performance/m0-synthetic-benchmark-replay-v1.toml tests/corpus/manifests/t0-bootstrap-v1.toml",
]
remaining_non_blocking = [
  "platform containment and complete runtime, license, font, and color closure before registered DIFFERENTIAL CI or untrusted inputs",
  "baseline-ledger registration and executable replacement protection before an external observation may become gating",
  "registered fuzzing, broad corpus differential coverage, fixed-pool performance evidence, and M1 product-service gates",
]

[[milestone]]
id = "M1"
title = "Bytes and objects"
owner_role = "parser-security"
reviewer_roles = ["quality-corpus", "spec-conformance"]
planned_fte = 4.0
start_date = 2026-07-15
target_date = 2026-10-30
dependencies = ["M0"]
max_parallel_work_items = 3
deliverables = [
  "SourceSnapshot and Range pause/resume",
  "syntax, xref, and object layers",
  "R0/R1 repair",
]
exit_gate = "Out-of-order Range, cancellation, and source-change E2E pass; page-count and outline services reach DIFFERENTIAL."
status = "complete"
completed_at = 2026-07-15
reviewed_by_roles = ["quality-corpus", "spec-conformance"]
evidence = [
  "snapshot-bound Range pause/resume, reverse delivery, cancellation, and source-change E2E: cargo test -p pdf-rs-session --test range_loopback_http --test m1_strict_document_session",
  "bounded syntax, xref, object, strict R0, and local R1 layers: cargo test --workspace --all-targets",
  "R0 and R1 reviewed REFERENCE profiles plus page-count and outline DIFFERENTIAL profiles: cargo run --quiet --package pdf-rs-quality -- validate-m1-maturity docs/traceability/capability-profiles.toml",
  "four registered service cases, two disjoint holdouts, and separate same-input O2 adjudication: cargo run --quiet --package pdf-rs-quality -- validate-cases tests/cases and cargo test -p pdf-rs-quality --test m1_document_service_maturity -- --nocapture",
  "full-session Native/reference comparison: cargo test -p pdf-rs-quality --test m1_document_service_differential -- --nocapture",
  "registered three-seed libFuzzer replay and real cmin: cargo test -p pdf-rs-quality --test m1_document_service_fuzz -- --nocapture",
  "exact 21-sample locked release benchmark: cargo test --release --locked -p pdf-rs-quality --test m1_document_service_maturity native_document_service_benchmark_emits_positive_same_scope_samples -- --nocapture",
]
remaining_non_blocking = [
  "generic multi-job scheduler with priority, fairness, backpressure, and a complete Session, request, Worker, and IPC registry",
  "product Range transport and browser or desktop E2E beyond the deterministic test-only loopback host",
  "CANARY-scale holdout, continuous fuzzing, fixed-pool performance, and later release-profile evidence",
  "platform-enforced isolation and baseline-ledger registration before any external O4 observation may become gating",
]

[[milestone]]
id = "M2"
title = "Document and content"
owner_role = "graphics-color"
reviewer_roles = ["parser-security", "spec-conformance"]
planned_fte = 4.5
start_date = 2026-07-16
target_date = 2027-01-29
dependencies = ["M1"]
max_parallel_work_items = 3
deliverables = [
  "page tree and resource resolution",
  "Content VM",
  "Scene v1",
]
exit_gate = "Scene normative cases and canonical diff are stable."
status = "complete"
started_at = 2026-07-16
completed_at = 2026-07-16
reviewed_by_roles = ["parser-security", "spec-conformance"]
execution_plan = "plan/m2.toml"
evidence = [
  "bounded page, content, and Scene components: cargo test --locked --package pdf-rs-document --test page_index --test page_materialization --test page_properties --test page_content; cargo test --locked --package pdf-rs-content --test scanner --test vm; cargo test --locked --package pdf-rs-scene --test scene_v1 --test scene_diff",
  "six hash-bound valid, invalid, unsupported, resource, cancellation, and source-change cases with two canonical Scene goldens: cargo test --locked --package pdf-rs-quality --test m2_scene_gate",
  "four fresh debug/release Scene-gate replays and three recursive byte comparisons: scripts/ci.sh",
  "independent SHIP review and repository-only exit closure: docs/traceability/evidence/m2/scene-gate/independent-review.toml, docs/traceability/evidence/m2/scene-gate/normative-replay.toml, and cargo test --locked --package pdf-rs-quality --test m2_exit",
]
remaining_non_blocking = [
  "paths, painting, clipping, full graphics and text showing, fonts, glyphs, images, Forms, rendering, and broader resources",
  "acquired-chain page indexing, materialization, and content acquisition plus nested component aliases",
  "generic Session, Worker, IPC, renderer adapters, and product browser or desktop integration",
  "feature maturity promotion beyond PLANNED, broader corpus and fuzz campaigns, and fixed-pool performance evidence",
]

[[milestone]]
