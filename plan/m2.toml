schema = 1
milestone = "M2"
title = "Document and content"
status = "in_progress"
depends_on = ["M1"]
exit_gate = "Scene normative cases and canonical diff are stable."
max_parallel_work_items = 3

principles = [
  "Keep document semantics proof-bound to one immutable source snapshot and revision.",
  "Build page, content, and Scene services as bounded resumable or pure jobs without platform I/O.",
  "Keep canonical Scene output deterministic and independent of allocator, thread, path, and environment state.",
  "Treat unsupported operators and resources as structured capability outcomes, never blank output.",
]

[[work_item]]
id = "M2-01"
title = "Proof-bound page index model and admission"
lane = "document-model"
status = "complete"
completed_at = 2026-07-16
depends_on = []
outcome = "A sealed validated traversal product can be admitted as exact leaf Page identities in logical order under an independent retained-memory budget."
acceptance = [
  "Existing scalar page-count behavior and maturity evidence remain unchanged.",
  "The immutable model retains Catalog, source snapshot, revision, traversal evidence, and logical order.",
  "Only a crate-private sealed order can construct the public PageIndex.",
  "Admission rejects count, authority, missing-object, page-count, and retained-capacity mismatches.",
  "M1 content-addressed page-count implementation and tests remain byte-for-byte unchanged.",
]

[[work_item]]
id = "M2-02"
title = "Page-tree integration, lazy segments, and page handles"
lane = "document-model"
status = "complete"
completed_at = 2026-07-16
depends_on = ["M2-01"]
outcome = "Page lookup validates only requested ranges and publishes source-bound PageHandle values."
acceptance = [
  "The page-tree traversal mints the sealed order without changing accepted M1 evidence.",
  "Segment summaries retain subtree ranges and validated Count evidence.",
  "Random access does not rebuild the complete page tree.",
  "PageHandle carries zero-based index, exact Page object identity, and revision binding.",
  "Cancellation, source change, cycles, duplicate children, and stale handles remain stable failures.",
]

[[work_item]]
id = "M2-03"
title = "Inherited page boxes, rotation, and resource scopes"
lane = "document-model"
status = "complete"
completed_at = 2026-07-16
depends_on = ["M2-02"]
outcome = "PageHandle materializes inherited MediaBox, CropBox, Rotate, and Resources with provenance."
acceptance = [
  "Inheritance walks the validated ancestor chain with depth and object-work budgets.",
  "Resource scopes retain the defining object and lookup chain.",
  "Invalid boxes, rotation, aliases, missing resources, and duplicate keys have structured outcomes.",
  "No renderer, platform I/O, or global object graph is introduced.",
]

[[work_item]]
id = "M2-04"
title = "Scene v1 schema and canonical diff"
lane = "scene"
status = "complete"
completed_at = 2026-07-16
depends_on = []
