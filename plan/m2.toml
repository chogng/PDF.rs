acceptance = [
  "Schema version, page geometry, commands, resources, features, and provenance have bounded ownership.",
  "Canonical output normalizes numeric edge cases, ordering, and stable identifiers.",
  "Diff reports semantic command/resource changes without allocator or environment noise.",
  "Normative empty, structural, invalid, and budget cases are registered.",
]

