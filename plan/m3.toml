schema = 1
milestone = "M3"
title = "Reference renderer"
status = "in_progress"
started_at = 2026-07-16
depends_on = ["M2"]
exit_gate = "O0/O1 cases validate the registered M3 Reference profiles; independently reviewed O3 goldens cover that bounded Native graphics subset and establish the Reference baseline for later R0 closure."
max_parallel_work_items = 3

principles = [
  "Treat the project-owned Reference implementation as an implementation under test, never an automatic specification oracle.",
  "Separate PDF semantic conformance from the versioned project-level raster rules for flattening, coverage, compositing, color conversion, and output pixels.",
  "Preserve graphics, text, image, color, clipping, and transparency semantics in Scene before rasterization.",
  "Use checked fixed-point geometry, deterministic work accounting, cooperative cancellation, and atomic pixel publication without platform graphics APIs.",
  "Keep O0/O1 independently derived expectations separate from O3 Reference-generated regression goldens.",
  "Keep external engines outside product dependencies and outside every M3 correctness or release verdict.",
  "Interpret the three logical lanes as review and dependency limits for one developer; shared implementation changes remain serial and stage-committed.",
]

registered_scope = [
  "Path construction, nonzero/even-odd fill, stroke, line width/cap/join/miter/dash, and nested clipping.",
  "DeviceGray, DeviceRGB, and DeviceCMYK conversion plus constant alpha and Normal, Multiply, and Screen compositing.",
  "Basic unmasked Image XObjects using the explicitly registered decoded formats, color spaces, bit depths, and deterministic sampling policy.",
  "Basic embedded simple-font text showing with project-owned deterministic glyph outlines and no operating-system font or hinting dependency.",
  "A single-threaded deterministic Reference path from immutable Scene to canonical top-down RGBA pixels.",
]

excluded_scope = [
  "Form XObjects, inline images, axial or radial shading, Patterns, soft masks, knockout groups, non-isolated groups, DeviceN, ICCBased color, overprint, and optional-content rendering.",
  "System-font fallback, operating-system hinting or antialiasing, advanced CMap and shaping coverage, and complete text extraction or accessibility.",
  "Fast CPU, GPU, tile scheduling, product Surface lifecycle, shared-memory transport, Session or Worker integration, IPC, browser, and desktop display.",
  "DIFFERENTIAL, CANARY, DEFAULT, STABLE, complete R0 graphics, or release promotion.",
]

[[work_item]]
id = "M3-01"
title = "Reference pixel foundation"
lane = "reference-raster"
status = "complete"
completed_at = 2026-07-16
depends_on = []
outcome = "A bounded pure product crate consumes the current non-painting Scene subset and atomically publishes one deterministic canonical pixel buffer."
acceptance = [
  "The value-only pixel buffer is distinct from the worker/session-owned Surface lifecycle reserved for M4.",
  "The foundation fixes top-down opaque sRGB-reference-v1 straight-alpha RGBA8 output without freezing page-to-device, flattening, coverage, or antialiasing rules prematurely.",
  "Width, height, pixels, stride, retained bytes, Scene commands, deterministic fuel, allocation, and cancellation are checked before publication.",
  "Current marked-content Scene commands are explicit non-painting operations; future command variants cannot silently render blank output.",
  "Failure and cancellation never publish partial pixels, and terminal outcomes replay without additional work.",
  "The crate has no filesystem, network, process, unsafe, platform graphics, or external-engine dependency.",
]

[[work_item]]
id = "M3-02"
title = "Raster oracle and case contract"
lane = "quality"
status = "complete"
completed_at = 2026-07-16
depends_on = ["M3-01"]
outcome = "Case manifests and evidence distinguish independent O0/O1 pixel authority from reviewed O3 Reference regression artifacts."
acceptance = [
  "Pixel artifacts and hashes are paired, canonical, content-addressed, and backward-compatible with existing M0-M2 cases.",
  "O0/O1 expectations cannot be generated by the Reference implementation.",
  "O3 goldens require frozen Reference identity, two independent reviewer roles, and hash-bound review evidence.",
  "CI compares committed artifacts and never overwrites goldens.",
]

